<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌工作站 · 行事曆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400&family=Space+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--white:#fff;--bg:#f7f6f4;--bg2:#f0eeeb;--line:#d8d5d0;--line2:#ece9e4;--ink:#1a1917;--ink2:#4a4840;--ink3:#9a9890;--ink4:#c8c5c0;--red:#8B3015;--red2:#6B2010;}
html,body{height:100%;font-size:12px;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-weight:300;display:flex;flex-direction:column;overflow:hidden;}

/* ===== 頭像選擇頁（Netflix 風格滿版） ===== */
.picker-scr{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto;animation:pickerFade 0.4s ease-out;}
.picker-scr.hidden{display:none;}
@keyframes pickerFade{from{opacity:0;}to{opacity:1;}}
.picker-title{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:300;letter-spacing:0.15em;color:#fff;margin-bottom:8px;text-align:center;}
.picker-sub{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:50px;text-align:center;}
.picker-grid{display:flex;flex-direction:row;flex-wrap:nowrap;gap:20px;max-width:100%;width:100%;justify-content:center;align-items:center;overflow-x:auto;padding:10px 20px;-webkit-overflow-scrolling:touch;}
.picker-card{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;padding:12px;border-radius:8px;transition:all 0.2s ease;background:transparent;border:none;color:inherit;font-family:inherit;flex-shrink:0;}
.picker-card:hover{background:rgba(255,255,255,0.04);transform:translateY(-3px);}
.picker-avatar{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;background:var(--bg);border:2px solid transparent;transition:all 0.2s ease;}
.picker-card:hover .picker-avatar{border-color:var(--red);transform:scale(1.05);}
.picker-name{font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,0.75);letter-spacing:0.08em;}
.picker-card:hover .picker-name{color:#fff;}
@media(max-width:480px){
  .picker-title{font-size:22px;}
  .picker-sub{margin-bottom:30px;}
  .picker-grid{justify-content:flex-start;gap:12px;padding:10px 16px;}
  .picker-avatar{width:72px;height:72px;font-size:36px;}
  .picker-name{font-size:12px;}
  .picker-card{padding:8px;gap:10px;}
}

/* TOP NAV */
.top-nav{height:46px;background:var(--ink);display:flex;align-items:center;padding:0 max(16px,2vw);gap:16px;flex-shrink:0;}
.back-btn{font-family:'Space Mono',monospace;font-size:15px;font-weight:400;letter-spacing:1px;color:#fff;text-decoration:none;text-transform:uppercase;transition:opacity 0.2s;}
.back-btn:hover{opacity:0.75;}
.nav-sep{width:1px;height:16px;background:rgba(255,255,255,0.2);}
.nav-title{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2.5px;color:rgba(255,255,255,0.5);text-transform:uppercase;}

/* ===== picker：預選高亮 + 確認按鈕 ===== */
.picker-card.preselected .picker-avatar{border-color:var(--red);box-shadow:0 0 0 4px rgba(139,48,21,0.25);transform:scale(1.05);}
.picker-card.preselected .picker-name{color:#fff;font-weight:400;}
/* 有人被預選時，其他卡片變淺（淺灰 + 低透明度） */
.picker-grid.has-preselected .picker-card:not(.preselected){opacity:0.35;}
.picker-grid.has-preselected .picker-card:not(.preselected) .picker-avatar{filter:grayscale(0.6);background:rgba(255,255,255,0.08);}
.picker-grid.has-preselected .picker-card:not(.preselected) .picker-name{color:rgba(255,255,255,0.4);}
.picker-grid.has-preselected .picker-card:not(.preselected):hover{opacity:0.7;}
.picker-confirm-wrap{margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.picker-hint{font-family:'Noto Sans TC',sans-serif;font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.1em;}
.picker-confirm{font-family:'Noto Sans TC',sans-serif;font-size:14px;letter-spacing:0.15em;padding:12px 42px;background:var(--red);color:#fff;border:none;border-radius:2px;cursor:pointer;transition:all 0.2s;font-weight:400;}
.picker-confirm:hover{background:var(--red2);transform:translateY(-1px);}
.picker-confirm:disabled{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);cursor:not-allowed;transform:none;}
@media(max-width:480px){
  .picker-confirm-wrap{margin-top:24px;gap:10px;}
  .picker-confirm{font-size:13px;padding:10px 32px;}
}

/* BRAND TABS */
.brand-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--white);padding:0 max(16px,2vw);flex-shrink:0;-webkit-overflow-scrolling:touch;align-items:center;}
.brand-tab{display:flex;align-items:center;gap:6px;padding:14px 20px;font-size:17px;color:var(--ink3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;}
.brand-tab:hover{color:var(--ink2);}
.brand-tab.active{color:var(--ink);border-bottom-color:var(--red);}

/* ===== 右上角編輯者顯示（純文字 + 小頭像） ===== */
.editor-display{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 10px;flex-shrink:0;user-select:none;}
.editor-avatar-sm{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg2);border:1px solid var(--line);flex-shrink:0;}
.editor-name-sm{font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--ink2);letter-spacing:0.05em;white-space:nowrap;}
.editor-lbl-sm{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;white-space:nowrap;margin-right:2px;}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 max(16px,2vw);max-width:1800px;width:100%;margin:0 auto;box-sizing:border-box;}

/* CAL NAV */
.cal-nav{display:flex;align-items:center;gap:8px;padding:10px 0 8px;flex-shrink:0;}
.arr-btn{width:34px;height:34px;background:transparent;border:1px solid var(--line);color:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0;transition:all 0.12s;}
.arr-btn:hover{border-color:var(--red);color:var(--red);}
.cal-month{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:300;letter-spacing:0.1em;color:var(--ink);flex:1;}
.today-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;background:transparent;border:1px solid var(--line);color:var(--ink3);cursor:pointer;transition:all 0.12s;}
.today-btn:hover{border-color:var(--red);color:var(--red);}
.add-ev-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 18px;background:var(--red);color:#fff;border:none;cursor:pointer;transition:background 0.2s;}
.add-ev-btn:hover{background:var(--red2);}

/* LEGEND */
.legend-row{display:flex;align-items:center;gap:4px;padding:5px 0 7px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid var(--line2);}
.leg-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 7px;transition:all 0.15s;border-radius:2px;border:1px solid transparent;}
.leg-item:hover{background:var(--bg2);}
.leg-item.dimmed{opacity:0.28;}
.leg-dot{width:13px;height:13px;border-radius:2px;flex-shrink:0;}
.leg-label{font-size:14px;color:var(--ink2);}

/* CALENDAR GRID */
.cal-scroll{flex:1;overflow-y:auto;padding-bottom:24px;}
.cal-wrap{border:1px solid var(--line);background:var(--white);margin-top:8px;position:relative;}
.cal-cell{padding:7px 6px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);overflow:hidden;display:flex;flex-direction:column;height:340px;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:340px;}
/* 日期數字區（頂部）不滾動，事件區往下滑 */
.cal-cell .dnum{flex-shrink:0;}
.cal-cell .cal-ev-list{flex:1;overflow-y:auto;overflow-x:hidden;padding-right:2px;}
/* 客製化細捲軸，不要搶視覺 */
.cal-cell .cal-ev-list::-webkit-scrollbar{width:4px;}
.cal-cell .cal-ev-list::-webkit-scrollbar-track{background:transparent;}
.cal-cell .cal-ev-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
.cal-cell .cal-ev-list::-webkit-scrollbar-thumb:hover{background:var(--ink4);}

.span-ev{}

.cal-wds{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--line);}
.cal-wd{text-align:center;padding:8px 0;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;letter-spacing:0.04em;color:var(--ink);}



@media(min-width:600px){}
.cal-cell:hover{background:rgba(26,25,23,0.015);}
.cal-cell.past-day{background:#f5f4f2;}
.cal-cell.past-day 
.cal-cell.past-day .cal-ev{opacity:0.4;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-m{background:var(--bg2);opacity:0.4;}

.cal-ev:hover{opacity:0.7;}
.cal-ev.ev-drag-over{outline:2px dashed var(--red);outline-offset:-1px;}
.more-ev{font-family:'Space Mono',monospace;font-size:8px;color:var(--ink4);padding:1px 4px;cursor:pointer;}
.cal-cell.dense .dnum{font-size:11px;}
.cal-cell.dense .dnum-n{width:20px;height:20px;font-size:11px;}
.cal-cell.dense .dnum-tag{font-size:10px;}
.cal-cell.dense .cal-ev{font-size:15px;padding:2px 5px;margin-bottom:2px;}
.cal-cell.dense .cal-ev span,.cal-cell.dense .cal-ev div{font-size:15px;}
.more-ev:hover{color:var(--red);}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(26,23,20,0.48);z-index:800;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.18s;}
@media(min-width:540px){.modal-ov{align-items:center;}}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;transform:translateY(16px);transition:transform 0.2s;}
@media(min-width:540px){.modal{border-radius:0;border-bottom:1px solid var(--line);transform:translateY(8px);}}
.modal-ov.open .modal{transform:translateY(0);}
.modal-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1;}
.modal-ttl{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:400;letter-spacing:0.08em;color:var(--ink);}
.modal-x{background:transparent;border:1px solid var(--line);color:var(--ink3);width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.modal-x:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:14px 16px;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;align-items:center;position:sticky;bottom:0;background:var(--bg);}

/* FORM */
.f-lbl{display:block;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin-bottom:5px;}
.f-req{color:var(--red);margin-left:2px;}
.f-inp,.f-ta{width:100%;padding:8px 10px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;transition:border-color 0.18s;}
.f-inp:focus,.f-ta:focus{border-color:var(--red);background:#fff;}
.f-inp::placeholder,.f-ta::placeholder{color:var(--ink4);font-size:11px;}
.f-ta{resize:vertical;min-height:56px;line-height:1.8;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-grp{margin-bottom:12px;}

/* TYPE BUTTONS */
.type-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.type-btn{padding:5px 10px;font-size:11px;border:1px solid;background:transparent;cursor:pointer;transition:all 0.12s;font-family:'Noto Sans TC',sans-serif;border-radius:2px;}

/* TIME BUTTONS */
.time-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.time-btn{padding:5px 11px;font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,0.6);color:var(--ink2);cursor:pointer;transition:all 0.12s;font-family:'Space Mono',monospace;border-radius:2px;}
.time-btn:hover{border-color:var(--ink2);}
.time-btn.sel{background:var(--ink);color:#fff;border-color:var(--ink);}

/* PLATFORM LIST */
.plat-list{margin-top:8px;display:flex;flex-direction:column;gap:2px;}
.plat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:var(--bg2);border-radius:2px;}
.plat-name{font-size:11px;color:var(--ink2);}
.plat-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink3);}


/* MODAL BUTTONS */
.m-p{padding:7px 16px;background:var(--red);color:#fff;border:none;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.m-p:hover{background:var(--red2);}
.m-g{padding:7px 12px;background:transparent;border:1px solid var(--line);color:var(--ink3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
.m-g:hover{border-color:var(--ink2);color:var(--ink2);}
.m-del{padding:7px 10px;background:transparent;border:1px solid rgba(163,45,45,0.25);color:#8B2020;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;}
.m-del:hover{background:rgba(163,45,45,0.05);border-color:#8B2020;}
.m-dup{padding:7px 10px;background:transparent;border:1px solid var(--line);color:var(--ink3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;margin-right:auto;}
.m-dup:hover{border-color:var(--ink2);color:var(--ink2);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:900;background:var(--ink);color:rgba(255,255,255,0.9);padding:10px 18px;font-family:'Noto Sans TC',sans-serif;font-size:13px;letter-spacing:0.5px;opacity:0;transform:translateY(5px);transition:all 0.2s;pointer-events:none;max-width:320px;border-radius:3px;}
.toast.show{opacity:1;transform:translateY(0);}
/* CUSTOM DATE PICKER */
.dp-wrap{position:relative;}
.dp-input{width:100%;padding:8px 10px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;cursor:pointer;transition:border-color 0.18s;text-align:left;}
.dp-input:focus{border-color:var(--red);}
.dp-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:999;background:var(--white);border:1px solid var(--line);padding:10px;width:240px;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.dp-popup.hidden{display:none;}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dp-nav{background:transparent;border:1px solid var(--line);color:var(--ink3);width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;}
.dp-nav:hover{border-color:var(--red);color:var(--red);}
.dp-month-lbl{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:0.06em;color:var(--ink);}
.dp-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.dp-wd{text-align:center;font-family:'Space Mono',monospace;font-size:8px;color:var(--ink4);padding:3px 0;letter-spacing:0.5px;}
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dp-day{text-align:center;padding:5px 2px;font-size:11px;color:var(--ink2);cursor:pointer;border-radius:1px;transition:background 0.1s;}
.dp-day:hover{background:var(--bg2);}
.dp-day.today{font-weight:500;color:var(--red);}
.dp-day.selected{background:var(--red);color:#fff;}
.dp-day.other-m{color:var(--ink4);opacity:0.4;}
.dp-day.empty{cursor:default;}

.cal-ev{padding:4px 7px;margin-bottom:3px;font-size:18px;line-height:1.3;overflow-x:auto;overflow-y:hidden;border-radius:2px;transition:opacity 0.12s;flex-shrink:0;display:block;width:100%;box-sizing:border-box;cursor:pointer;scrollbar-width:none;}
.cal-ev::-webkit-scrollbar{display:none;}
.cal-ev:hover{opacity:0.7;}
.cal-ev.ev-drag-over{outline:2px dashed var(--red);outline-offset:-1px;}
/* DRAG */
.cal-ev{cursor:grab;}
.cal-ev.dragging{opacity:0.4;cursor:grabbing;}
.cal-cell.drag-over{background:rgba(139,48,21,0.07);outline:2px dashed #8B3015;outline-offset:-2px;}


.dnum{display:flex;flex-direction:row;align-items:center;flex-wrap:nowrap;gap:3px;margin-bottom:2px;overflow:hidden;}
.dnum-n{font-family:'Space Mono',monospace;font-size:13px;color:var(--ink4);width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cal-cell.is-today .dnum-n{background:var(--red);color:#fff;}
.dnum-tag{font-family:'Noto Sans TC',sans-serif;font-size:11px;color:#B85C2C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1;}
.cal-cell.past-day .dnum-n{opacity:0.4;}
.cal-cell.past-day .dnum-tag{opacity:0.4;}

.span-ev{}


</style>
<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCNmiIs6tatLz6SYRkmJC7ygc0zK1jZa8Y",
  authDomain: "walkin-team.firebaseapp.com",
  projectId: "walkin-team",
  storageBucket: "walkin-team.firebasestorage.app",
  messagingSenderId: "480853601275",
  appId: "1:480853601275:web:0c77db9c23672784f3395e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._fbSave = async function(data) {
  try {
    await setDoc(doc(db, 'calendar', 'main'), data);
  } catch(e) { console.error('Firebase save error', e); }
};

window._fbListen = function(callback) {
  onSnapshot(doc(db, 'calendar', 'main'), function(snapshot) {
    if (snapshot.exists()) {
      callback(snapshot.data());
    }
  });
};

window._fbReady = true;
window.dispatchEvent(new Event('fbReady'));
</script>
</head>
<body>

<!-- ===== 頭像選擇頁（全螢幕） ===== -->
<div class="picker-scr" id="pickerScr">
  <div class="picker-title">請選擇你是誰</div>
  <div class="picker-sub">WHO'S EDITING</div>
  <div class="picker-grid" id="pickerGrid"></div>
  <div class="picker-confirm-wrap">
    <button class="picker-confirm" id="pickerConfirmBtn" onclick="pickerConfirm()" disabled>確 認 進 入</button>
  </div>
</div>

<div class="top-nav">
  <a href="index.html" class="back-btn">&#8592; 任務分工</a>
  <div class="nav-sep"></div>
  <div class="nav-title">行事曆</div>
</div>

<div class="brand-tabs">
  <button class="brand-tab active" data-brand="meowling" onclick="calSwitchBrand(this)">🔮 妙靈女子</button>
  <button class="brand-tab" data-brand="hulu" onclick="calSwitchBrand(this)">🎵 葫蘆流</button>
  <button class="brand-tab" data-brand="jennyoga" onclick="calSwitchBrand(this)">🧘 jennyoga</button>
  <button class="brand-tab" data-brand="tongling" onclick="calSwitchBrand(this)">🏮 通通靈</button>
  <div class="editor-display" id="editorDisplay">
    <span class="editor-lbl-sm">編輯者</span>
    <div class="editor-avatar-sm" id="editorAvatarSm">👤</div>
    <span class="editor-name-sm" id="editorNameSm">－</span>
  </div>
</div>

<div class="content">
  <div class="cal-nav">
    <button class="arr-btn" onclick="calPrev()">&#8592;</button>
    <button class="arr-btn" onclick="calNext()">&#8594;</button>
    <div class="cal-month" id="calMonthH"></div>
    <button class="today-btn" onclick="calGoToday()">今天</button>

// ============================================================
// 編輯者管理（Netflix 風頭像選擇 + 右上角顯示）
// ============================================================
const EDITOR_KEY='wk_editor';
const EDITORS=[
  {name:'妙靈老師',emoji:'🪷'},
  {name:'Jenny老師',emoji:'🧘🏻'},
  {name:'AI王',emoji:'🧝🏼‍♂️'},
  {name:'Bessie',emoji:'🐕'},

  {name:'訪客',emoji:'👤'}
];
let currentEditor=localStorage.getItem(EDITOR_KEY)||'';
let pickerCandidate='';  // 預選中、尚未確認的編輯者

// 取得編輯者的 emoji（給右上角顯示用）
function getEditorEmoji(name){
  var found=EDITORS.find(function(e){return e.name===name;});
  return found?found.emoji:'👤';
}

// 更新右上角編輯者顯示
function refreshEditorDisplay(){
  var avatarEl=document.getElementById('editorAvatarSm');
  var nameEl=document.getElementById('editorNameSm');
  if(!avatarEl||!nameEl)return;
  if(currentEditor){
    avatarEl.textContent=getEditorEmoji(currentEditor);
    nameEl.textContent=currentEditor;
  }else{
    avatarEl.textContent='👤';
    nameEl.textContent='－';
  }
}

// 點某個頭像：設為「預選」狀態（還沒真正進入）
function pickerSelect(name){
  pickerCandidate=name;
  // 更新所有卡片的高亮狀態
  document.querySelectorAll('.picker-card').forEach(function(card){
    card.classList.toggle('preselected',card.dataset.editor===name);
  });
  // grid 加上 has-preselected，讓其他卡片變淺
  var grid=document.getElementById('pickerGrid');
  if(grid)grid.classList.add('has-preselected');
  // 解鎖確認按鈕
  var btn=document.getElementById('pickerConfirmBtn');
  if(btn)btn.disabled=false;
}

// 按下「確認進入」：真正寫入 localStorage 並進入行事曆
function pickerConfirm(){
  if(!pickerCandidate)return;
  currentEditor=pickerCandidate;
  localStorage.setItem(EDITOR_KEY,pickerCandidate);
  refreshEditorDisplay();
  var scr=document.getElementById('pickerScr');
  if(scr){
    scr.style.transition='opacity 0.3s ease';
    scr.style.opacity='0';
    setTimeout(function(){scr.classList.add('hidden');scr.style.opacity='';},300);
  }
  calShowToast('歡迎，'+currentEditor+' ✨');
}

// 建立頭像選擇頁的卡片
function buildPicker(){
  var grid=document.getElementById('pickerGrid');
  if(!grid)return;
  grid.innerHTML='';
  EDITORS.forEach(function(e){
    var card=document.createElement('button');
    card.className='picker-card';
    card.dataset.editor=e.name;
    card.onclick=function(){pickerSelect(e.name);};
    var av=document.createElement('div');
    av.className='picker-avatar';av.textContent=e.emoji;
    var nm=document.createElement('div');
    nm.className='picker-name';nm.textContent=e.name;
    card.appendChild(av);card.appendChild(nm);
    grid.appendChild(card);
  });
}

// 頁面載入時：一律顯示選擇頁，若有上次記錄則預選高亮（只要按確認即可）
function initEditor(){
  buildPicker();
  refreshEditorDisplay();
  if(currentEditor){
    // 有上次的記錄 → 預選高亮，但仍要求按確認
    pickerSelect(currentEditor);
  }
  // 沒有記錄就維持「請選擇」狀態，按鈕 disabled
}
window.addEventListener('DOMContentLoaded',initEditor);

// ============================================================
// Google Calendar 雙向同步
// ============================================================
const GCAL_API='/api/gcal-sync';
const GCAL_ENABLED=true;

async function gcalCall(action,data){
  if(!GCAL_ENABLED)return{ok:false,skipped:true};
  try{
    var params=new URLSearchParams({action:action});
    Object.keys(data||{}).forEach(function(k){
      if(data[k]!==undefined&&data[k]!==null)params.append(k,data[k]);
    });
    var resp=await fetch(GCAL_API+'?'+params.toString());
    var json=await resp.json();
    return json;
  }catch(err){
    console.error('gcalCall error:',err);
    return{ok:false,error:err.message};
  }
}

async function gcalSyncCreate(ev){
  if(calBrand!=='meowling')return;
  var brandName={meowling:'妙靈',hulu:'葫蘆流',jennyoga:'jennyoga',tongling:'通通靈'}[calBrand]||'';
  var result=await gcalCall('create',{
    title:ev.title,date:ev.date,dateEnd:ev.dateEnd||'',time:ev.time||'allday',
    kw:ev.kw||'',note:ev.note||'',brand:brandName,editor:currentEditor||'未署名'
  });
  if(result.ok&&result.gcalId){
    var arr=calDB[calBrand]||[];
    var idx=arr.findIndex(function(e){return e.id===ev.id;});
    if(idx>-1){arr[idx].gcalId=result.gcalId;calSave();}
    calShowToast('✓ 已同步至 Google 日曆');
  }else if(!result.skipped){
    console.error('GCal 同步失敗:',result);
    calShowToast('⚠ Google 日曆同步失敗,本地已儲存');
  }
}

async function gcalSyncUpdate(ev){
  if(calBrand!=='meowling')return;
  if(!ev.gcalId)return gcalSyncCreate(ev);
  var brandName={meowling:'妙靈',hulu:'葫蘆流',jennyoga:'jennyoga',tongling:'通通靈'}[calBrand]||'';
  var result=await gcalCall('update',{
    gcalId:ev.gcalId,title:ev.title,date:ev.date,dateEnd:ev.dateEnd||'',
    time:ev.time||'allday',kw:ev.kw||'',note:ev.note||'',
    brand:brandName,editor:currentEditor||'未署名'
  });
  if(result.ok){calShowToast('✓ 已同步更新至 Google 日曆');}
  else if(!result.skipped){console.error('GCal 更新失敗:',result);calShowToast('⚠ Google 日曆同步失敗');}
}

async function gcalSyncDelete(gcalId){
  if(calBrand!=='meowling')return;
  if(!gcalId)return;
  var result=await gcalCall('delete',{gcalId:gcalId});
  if(result.ok){calShowToast('✓ 已同步刪除');}
  else if(!result.skipped){console.error('GCal 刪除失敗:',result);}
}

function calRender(){
  var todayStr=calTodayStr();

  var first=new Date(calY,calM-1,1),last=new Date(calY,calM,0);
  var dow=first.getDay();if(dow===0)dow=7;
  var grid=document.getElementById('calDays');
  grid.innerHTML='';
  var prev=new Date(calY,calM-1,0);
  var totalDays=last.getDate();

  for(var pi=dow-2;pi>=0;pi--){
    var pc=document.createElement('div');pc.className='cal-cell other-m';
    var pd=document.createElement('div');pd.className='dnum';
    var pn=document.createElement('div');pn.className='dnum-n';pn.textContent=prev.getDate()-pi;
    pd.appendChild(pn);pc.appendChild(pd);grid.appendChild(pc);
  }

  for(var d=1;d<=totalDays;d++){(function(ds,d){
    var isPast=ds<todayStr;
    var c=document.createElement('div');
    c.className='cal-cell'+(ds===todayStr?' is-today':isPast?' past-day':'');
    c.dataset.date=ds;

    var dn=document.createElement('div');dn.className='dnum';
    var dnN=document.createElement('div');dnN.className='dnum-n';dnN.textContent=d;dn.appendChild(dnN);
    var mmdd=String(calM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(FIXED_LABELS[mmdd]){var dtag=document.createElement('div');dtag.className='dnum-tag';dtag.textContent=FIXED_LABELS[mmdd];dn.appendChild(dtag);}
    c.appendChild(dn);

    // 建立事件清單容器（可垂直捲動）
    var evList=document.createElement('div');
    evList.className='cal-ev-list';
    c.appendChild(evList);

    var dayEvs=(calDB[calBrand]||[]).filter(function(e){
      if(calFilters.size>0){
        var ets=getEvTypes(e);
        // 事件的任何一個標籤被過濾掉 → 只要還有標籤沒被過濾就顯示；全部都被過濾才隱藏
        var hasVisible=ets.some(function(t){return !calFilters.has(t);});
        if(!hasVisible&&ets.length>0)return false;
      }
      if(e.dateEnd&&e.dateEnd>e.date)return false;
      return e.date===ds;
    }).sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
    dayEvs.forEach(function(ev){
      var evTypes=getEvTypes(ev);
      var col=getTypeColor(evTypes[0]||'');
      var el=document.createElement('div');
      el.className='cal-ev';
      el.style.cssText='background:'+col+'18;color:'+col+';border-left:2px solid '+col+';';
      var sq=document.createElement('div');
      sq.style.cssText='width:9px;height:9px;border-radius:1px;flex-shrink:0;background:'+col+';display:inline-block;margin-right:4px;vertical-align:middle;';
      var titleDiv=document.createElement('div');
      titleDiv.style.cssText='display:flex;align-items:center;';
      titleDiv.appendChild(sq);
      // 若事件選了多個標籤，名稱後用空格串接其他標籤名（略過第一個，因為它通常就是名稱本身）
      var displayTitle=ev.title;
      if(evTypes.length>1){
        var extraLabels=evTypes.slice(1).map(getTypeLabel).filter(Boolean);
        if(extraLabels.length>0)displayTitle=ev.title+' '+extraLabels.join(' ');
      }
      var te=document.createElement('span');te.textContent=displayTitle;te.style.cssText='white-space:nowrap;font-size:18px;';
      titleDiv.appendChild(te);el.appendChild(titleDiv);
      if(ev.kw){
        var ne=document.createElement('div');
        ne.style.cssText='font-size:14px;opacity:0.7;white-space:nowrap;padding-left:13px;';
        ne.textContent=ev.kw;el.appendChild(ne);
      }
      el.onclick=function(e){e.stopPropagation();calOpenEdit(ev.id);};
      el.draggable=true;
      el.ondragstart=function(e){dragEvId=ev.id;e.dataTransfer.effectAllowed='move';e.stopPropagation();el.style.opacity='0.4';};
      el.ondragend=function(){el.style.opacity='';document.querySelectorAll('.drag-over').forEach(function(x){x.classList.remove('drag-over');});};
      el.ondragover=function(e){e.preventDefault();e.stopPropagation();el.classList.add('ev-drag-over');};
      el.ondragleave=function(){el.classList.remove('ev-drag-over');};
      (function(eid,edate){
        el.ondrop=function(e){
          e.preventDefault();e.stopPropagation();el.classList.remove('ev-drag-over');
          if(!dragEvId||dragEvId===eid)return;
          var arr=calDB[calBrand]||[];
          var fromIdx=arr.findIndex(function(x){return x.id===dragEvId;});
          var toIdx=arr.findIndex(function(x){return x.id===eid;});
          if(fromIdx<0||toIdx<0)return;
          if(arr[fromIdx].date!==edate)return;
          var item=arr.splice(fromIdx,1)[0];
          var newTo=arr.findIndex(function(x){return x.id===eid;});
          arr.splice(newTo,0,item);
          calDB[calBrand]=arr;
          calSave();calRender();dragEvId=null;
        };
      })(ev.id,ev.date);
      evList.appendChild(el);
    });


    c.ondblclick=function(){calOpenAdd(ds);};
    c.ondragover=function(e){e.preventDefault();c.classList.add('drag-over');};
    c.ondragleave=function(e){if(!c.contains(e.relatedTarget))c.classList.remove('drag-over');};
    c.ondrop=function(e){
      e.preventDefault();c.classList.remove('drag-over');if(!dragEvId)return;
      var found=(calDB[calBrand]||[]).find(function(x){return x.id===dragEvId;});
      if(!found||found.date===ds)return;
      var oldDate=found.date;
      var diff=(new Date(ds)-new Date(oldDate))/(1000*60*60*24);
      found.date=ds;
      if(found.dateEnd&&found.dateEnd>oldDate){
        var ed=new Date(found.dateEnd);ed.setDate(ed.getDate()+diff);
        found.dateEnd=calFmt(ed.getFullYear(),ed.getMonth()+1,ed.getDate());
      }
      calSave();calRender();calShowToast('已移至 '+ds.slice(5).replace('-','/'));
      gcalSyncUpdate(found);
      dragEvId=null;
    };
    grid.appendChild(c);
  })(calFmt(calY,calM,d),d);}

  var total=grid.children.length,rem=total%7===0?0:7-(total%7);
  for(var nd=1;nd<=rem;nd++){
    var nc=document.createElement('div');nc.className='cal-cell other-m';
    var ndn=document.createElement('div');ndn.className='dnum';
    var ndnN=document.createElement('div');ndnN.className='dnum-n';ndnN.textContent=nd;
    ndn.appendChild(ndnN);nc.appendChild(ndn);grid.appendChild(nc);
  }

  var multiEvs=(calDB[calBrand]||[]).filter(function(e){
    if(!(e.dateEnd&&e.dateEnd>e.date))return false;
    if(calFilters.size===0)return true;
    var ets=getEvTypes(e);
    if(ets.length===0)return true;
    return ets.some(function(t){return !calFilters.has(t);});
  }).sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  multiEvs.forEach(function(ev){
    var col=getTypeColor(getEvPrimaryType(ev));
    var mStart=calFmt(calY,calM,1);
    var mEnd=calFmt(calY,calM,totalDays);
    var cur=new Date(ev.date<mStart?mStart:ev.date);
    var endDate=new Date(ev.dateEnd>mEnd?mEnd:ev.dateEnd);
    var isFirst=true;
    while(cur<=endDate){
      var ds2=calFmt(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
      var cell=grid.querySelector('.cal-cell[data-date="'+ds2+'"]');
      if(cell){
        var bar=document.createElement('div');
        bar.className='cal-ev span-bar';
        var isLast=ds2===calFmt(endDate.getFullYear(),endDate.getMonth()+1,endDate.getDate());
        var isWeekStart=(cur.getDay()===1);
        bar.style.cssText='background:'+col+'18;color:'+col+
          ';border-left:'+(isFirst||isWeekStart?'2px solid '+col:'none')+
          ';border-right:none;margin-bottom:2px;border-radius:'+(isFirst||isWeekStart?'2px 0 0 2px':'0')+
          (isLast?';border-radius:0 2px 2px 0':'')
          +';';
        if(isFirst){
          var titleDiv=document.createElement('div');titleDiv.style.cssText='display:flex;align-items:center;';
          var sq=document.createElement('div');sq.style.cssText='width:9px;height:9px;border-radius:1px;flex-shrink:0;background:'+col+';display:inline-block;margin-right:4px;';
          var te=document.createElement('span');te.textContent=ev.title;te.style.cssText='white-space:nowrap;font-size:18px;';
          titleDiv.appendChild(sq);titleDiv.appendChild(te);bar.appendChild(titleDiv);
          if(ev.kw){var ne=document.createElement('div');ne.style.cssText='font-size:14px;opacity:0.7;white-space:nowrap;padding-left:13px;';ne.textContent=ev.kw;bar.appendChild(ne);}
        } else {
          var sp=document.createElement('div');sp.style.cssText='font-size:18px;line-height:1.3;min-height:22px;';sp.textContent=' ';bar.appendChild(sp);
          if(ev.kw){var sp2=document.createElement('div');sp2.style.cssText='font-size:14px;min-height:18px;';sp2.textContent=' ';bar.appendChild(sp2);}
        }
        bar.draggable=true;
        bar.ondragstart=function(e){dragEvId=ev.id;e.dataTransfer.effectAllowed='move';e.stopPropagation();bar.style.opacity='0.4';};
        bar.ondragend=function(){bar.style.opacity='';document.querySelectorAll('.drag-over').forEach(function(x){x.classList.remove('drag-over');});};
        bar.onclick=function(e){e.stopPropagation();calOpenEdit(ev.id);};
        var dnumEl=cell.querySelector('.dnum');
        var firstSingle=cell.querySelector('.cal-ev:not(.span-bar)');
        if(firstSingle&&ev.date<=ds2){
          cell.insertBefore(bar,firstSingle);
        } else {
          cell.appendChild(bar);
        }
      }
      isFirst=false;
      cur.setDate(cur.getDate()+1);
    }
  });
}

function setTypeButtons(vals,autoFill){

  if(Array.isArray(vals)){calSelTypes=vals.slice();}

    var tc=EV_TYPES.find(function(x){return x.id===b.dataset.t;});

    statsHtml+='<div>'+BRAND_LABEL[b]+'：<strong style="color:var(--ink);">'+n+'</strong> 筆</div>';
  });
  statsHtml='<div style="margin-bottom:6px;font-weight:400;color:var(--ink);">共 '+total+' 筆資料（全品牌・全年度）</div>'+statsHtml;
  document.getElementById('calDataStats').innerHTML=statsHtml;

  document.getElementById('calDataModalTitle').textContent='匯出資料';
  document.getElementById('calDataLabel').textContent='全部資料（可複製或下載備份）';
  var txt=document.getElementById('calDataTxt');
  txt.value=JSON.stringify(parsed,null,2);
  txt.readOnly=true;

  // 動作按鈕
  var actions=document.getElementById('calDataActions');
  actions.innerHTML='';
  var btnCopy=document.createElement('button');
  btnCopy.className='today-btn';btnCopy.textContent='📋 複製到剪貼簿';
  btnCopy.style.cssText='flex:1;min-width:130px;padding:10px;';
  btnCopy.onclick=function(){calDataCopyToClipboard();};
  var btnDownload=document.createElement('button');
  btnDownload.className='today-btn';btnDownload.textContent='💾 下載備份檔';
  btnDownload.style.cssText='flex:1;min-width:130px;padding:10px;';
  btnDownload.onclick=function(){calDataDownload();};
  var btnClose=document.createElement('button');
  btnClose.className='today-btn';btnClose.textContent='關閉';
  btnClose.style.cssText='flex:0 0 auto;padding:10px 20px;';
  btnClose.onclick=calDataCloseModal;
  actions.appendChild(btnCopy);actions.appendChild(btnDownload);actions.appendChild(btnClose);

  document.getElementById('calDataModal').classList.add('open');
}

function calDataCopyToClipboard(){
  var txt=document.getElementById('calDataTxt');
  // 先選取文字，無論是否支援 clipboard API 都能讓使用者手動複製
  txt.select();
  txt.setSelectionRange(0,999999);
  var done=false;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt.value).then(function(){
      calShowToast('✓ 已複製到剪貼簿');
      done=true;
    }).catch(function(){
      // fallback 到 document.execCommand
      try{
        if(document.execCommand('copy')){calShowToast('✓ 已複製到剪貼簿');done=true;}
      }catch(e){}
      if(!done)calShowToast('請手動按 Cmd/Ctrl+C 複製');
    });
  }else{
    try{
      if(document.execCommand('copy')){calShowToast('✓ 已複製到剪貼簿');done=true;}
    }catch(e){}
    if(!done)calShowToast('請手動按 Cmd/Ctrl+C 複製');
  }
}

function calDataDownload(){
  var txt=document.getElementById('calDataTxt').value;
  var blob=new Blob([txt],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var now=new Date();
  var ts=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  a.href=url;a.download='walkin-calendar-backup-'+ts+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  calShowToast('✓ 備份檔已下載');
}

function calImport(){
  document.getElementById('calDataModalTitle').textContent='匯入資料';
  document.getElementById('calDataLabel').textContent='將備份的 JSON 資料貼到下方，按「執行匯入」';
  document.getElementById('calDataStats').innerHTML='<div style="color:#C0392B;">⚠ 注意：匯入會覆蓋目前所有資料，建議先按「匯出」備份</div>';
  var txt=document.getElementById('calDataTxt');
  txt.value='';txt.readOnly=false;

  var actions=document.getElementById('calDataActions');
  actions.innerHTML='';
  var btnDo=document.createElement('button');
  btnDo.className='today-btn';btnDo.textContent='⚡ 執行匯入';
  btnDo.style.cssText='flex:1;min-width:130px;padding:10px;background:var(--red);color:#fff;border-color:var(--red);';
  btnDo.onclick=function(){calDataDoImport();};
  var btnClose=document.createElement('button');
  btnClose.className='today-btn';btnClose.textContent='取消';
  btnClose.style.cssText='flex:0 0 auto;padding:10px 20px;';
  btnClose.onclick=calDataCloseModal;
  actions.appendChild(btnDo);actions.appendChild(btnClose);

  document.getElementById('calDataModal').classList.add('open');
  setTimeout(function(){txt.focus();},100);
}

function calDataDoImport(){
  var data=document.getElementById('calDataTxt').value.trim();
  if(!data){calShowToast('請先貼上資料');return;}
  var parsed;
  try{
    parsed=JSON.parse(data);
  }catch(e){
    calShowToast('✗ 格式錯誤：不是有效的 JSON');return;
  }
  if(typeof parsed!=='object'||parsed===null||Array.isArray(parsed)){
    calShowToast('✗ 格式錯誤：應為品牌物件');return;
  }
  // 驗證是否有四個品牌的 key（允許部分缺漏）
  var VALID_BRANDS=['meowling','hulu','jennyoga','tongling'];
  var hasAnyBrand=VALID_BRANDS.some(function(b){return Array.isArray(parsed[b]);});
  if(!hasAnyBrand){
    calShowToast('✗ 找不到任何品牌資料（meowling/hulu/jennyoga/tongling）');return;
  }
  // 補齊缺少的品牌為空陣列
  VALID_BRANDS.forEach(function(b){if(!Array.isArray(parsed[b]))parsed[b]=[];});

  // 寫入 localStorage
  var cleanJson=JSON.stringify(parsed);
  localStorage.setItem(CAL_KEY,cleanJson);
  calDB=parsed;

  // 同步推送到 Firebase（如果有連線）—— 避免雲端舊資料倒回來覆蓋
  if(window._fbSave){
    try{window._fbSave(JSON.parse(cleanJson));}catch(e){console.warn('Firebase sync failed',e);}
  }

  calRender();
  calDataCloseModal();
  var total=0;
  VALID_BRANDS.forEach(function(b){total+=parsed[b].length;});
  calShowToast('✓ 匯入成功，共 '+total+' 筆資料');
}

calLoad();
calRender();

</script>
</body>
</html>
