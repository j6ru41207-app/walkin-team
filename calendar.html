<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌工作站 · 行事曆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400&family=Space+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--white:#fff;--bg:#f7f6f4;--bg2:#f0eeeb;--line:#d8d5d0;--line2:#ece9e4;--ink:#1a1917;--ink2:#4a4840;--ink3:#9a9890;--ink4:#c8c5c0;--red:#8B3015;--red2:#6B2010;}
html,body{height:100%;font-size:12px;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-weight:300;display:flex;flex-direction:column;overflow:hidden;}

/* TOP NAV */
.top-nav{height:46px;background:var(--ink);display:flex;align-items:center;padding:0 max(16px,4vw);gap:16px;flex-shrink:0;}
.back-btn{font-family:'Space Mono',monospace;font-size:13px;font-weight:400;letter-spacing:1px;color:#fff;text-decoration:none;text-transform:uppercase;transition:opacity 0.2s;}
.back-btn:hover{opacity:0.75;}
.nav-sep{width:1px;height:16px;background:rgba(255,255,255,0.2);}
.nav-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,0.3);text-transform:uppercase;}

/* BRAND TABS */
.brand-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--white);padding:0 max(16px,4vw);flex-shrink:0;-webkit-overflow-scrolling:touch;}
.brand-tab{display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:12px;color:var(--ink3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;}
.brand-tab:hover{color:var(--ink2);}
.brand-tab.active{color:var(--ink);border-bottom-color:var(--red);}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 max(12px,3vw);}

/* CAL NAV */
.cal-nav{display:flex;align-items:center;gap:8px;padding:10px 0 8px;flex-shrink:0;}
.arr-btn{width:26px;height:26px;background:transparent;border:1px solid var(--line);color:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;transition:all 0.12s;}
.arr-btn:hover{border-color:var(--red);color:var(--red);}
.cal-month{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:300;letter-spacing:0.1em;color:var(--ink);flex:1;}
.today-btn{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;background:transparent;border:1px solid var(--line);color:var(--ink3);cursor:pointer;transition:all 0.12s;}
.today-btn:hover{border-color:var(--red);color:var(--red);}
.add-ev-btn{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;background:var(--red);color:#fff;border:none;cursor:pointer;transition:background 0.2s;}
.add-ev-btn:hover{background:var(--red2);}

/* LEGEND */
.legend-row{display:flex;align-items:center;gap:4px;padding:5px 0 7px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid var(--line2);}
.leg-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 7px;transition:all 0.15s;border-radius:2px;border:1px solid transparent;}
.leg-item:hover{background:var(--bg2);}
.leg-item.dimmed{opacity:0.28;}
.leg-dot{width:13px;height:13px;border-radius:2px;flex-shrink:0;}
.leg-label{font-size:11px;color:var(--ink2);}

/* CALENDAR GRID */
.cal-scroll{flex:1;overflow-y:auto;padding-bottom:24px;}
.cal-wrap{border:1px solid var(--line);background:var(--white);margin-top:8px;position:relative;}
.cal-cell{padding:5px 4px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);overflow:hidden;display:flex;flex-direction:column;min-height:120px;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;}

.span-ev{}

.cal-wds{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--line);}
.cal-wd{text-align:center;padding:8px 0;font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;color:var(--ink);}



@media(min-width:600px){}
.cal-cell:hover{background:rgba(26,25,23,0.015);}
.cal-cell.past-day{background:#f5f4f2;}
.cal-cell.past-day 
.cal-cell.past-day .cal-ev{opacity:0.4;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-m{background:var(--bg2);opacity:0.4;}

.cal-ev:hover{opacity:0.7;}
.cal-ev.ev-drag-over{outline:2px dashed var(--red);outline-offset:-1px;}
.more-ev{font-family:'Space Mono',monospace;font-size:8px;color:var(--ink4);padding:1px 4px;cursor:pointer;}
.cal-cell.dense .dnum{font-size:8px;}
.cal-cell.dense .dnum-n{width:15px;height:15px;font-size:8px;}
.cal-cell.dense .dnum-tag{font-size:7px;}
.cal-cell.dense .cal-ev{font-size:8px;padding:1px 4px;margin-bottom:1px;}
.cal-cell.dense .cal-ev span,.cal-cell.dense .cal-ev div{font-size:8px;}
.more-ev:hover{color:var(--red);}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(26,23,20,0.48);z-index:800;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.18s;}
@media(min-width:540px){.modal-ov{align-items:center;}}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;transform:translateY(16px);transition:transform 0.2s;}
@media(min-width:540px){.modal{border-radius:0;border-bottom:1px solid var(--line);transform:translateY(8px);}}
.modal-ov.open .modal{transform:translateY(0);}
.modal-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1;}
.modal-ttl{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:400;letter-spacing:0.08em;color:var(--ink);}
.modal-x{background:transparent;border:1px solid var(--line);color:var(--ink3);width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.modal-x:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:14px 16px;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;align-items:center;position:sticky;bottom:0;background:var(--bg);}

/* FORM */
.f-lbl{display:block;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin-bottom:5px;}
.f-req{color:var(--red);margin-left:2px;}
.f-inp,.f-ta{width:100%;padding:8px 10px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;transition:border-color 0.18s;}
.f-inp:focus,.f-ta:focus{border-color:var(--red);background:#fff;}
.f-inp::placeholder,.f-ta::placeholder{color:var(--ink4);font-size:11px;}
.f-ta{resize:vertical;min-height:56px;line-height:1.8;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-grp{margin-bottom:12px;}

/* TYPE BUTTONS */
.type-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.type-btn{padding:5px 10px;font-size:11px;border:1px solid;background:transparent;cursor:pointer;transition:all 0.12s;font-family:'Noto Sans TC',sans-serif;border-radius:2px;}

/* TIME BUTTONS */
.time-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.time-btn{padding:5px 11px;font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,0.6);color:var(--ink2);cursor:pointer;transition:all 0.12s;font-family:'Space Mono',monospace;border-radius:2px;}
.time-btn:hover{border-color:var(--ink2);}
.time-btn.sel{background:var(--ink);color:#fff;border-color:var(--ink);}

/* PLATFORM LIST */
.plat-list{margin-top:8px;display:flex;flex-direction:column;gap:2px;}
.plat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:var(--bg2);border-radius:2px;}
.plat-name{font-size:11px;color:var(--ink2);}
.plat-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink3);}


/* MODAL BUTTONS */
.m-p{padding:7px 16px;background:var(--red);color:#fff;border:none;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.m-p:hover{background:var(--red2);}
.m-g{padding:7px 12px;background:transparent;border:1px solid var(--line);color:var(--ink3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
.m-g:hover{border-color:var(--ink2);color:var(--ink2);}
.m-del{padding:7px 10px;background:transparent;border:1px solid rgba(163,45,45,0.25);color:#8B2020;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;}
.m-del:hover{background:rgba(163,45,45,0.05);border-color:#8B2020;}
.m-dup{padding:7px 10px;background:transparent;border:1px solid var(--line);color:var(--ink3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;margin-right:auto;}
.m-dup:hover{border-color:var(--ink2);color:var(--ink2);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:900;background:var(--ink);color:rgba(255,255,255,0.85);padding:8px 14px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;opacity:0;transform:translateY(5px);transition:all 0.2s;pointer-events:none;max-width:280px;}
.toast.show{opacity:1;transform:translateY(0);}
/* CUSTOM DATE PICKER */
.dp-wrap{position:relative;}
.dp-input{width:100%;padding:8px 10px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;cursor:pointer;transition:border-color 0.18s;text-align:left;}
.dp-input:focus{border-color:var(--red);}
.dp-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:999;background:var(--white);border:1px solid var(--line);padding:10px;width:240px;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.dp-popup.hidden{display:none;}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dp-nav{background:transparent;border:1px solid var(--line);color:var(--ink3);width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;}
.dp-nav:hover{border-color:var(--red);color:var(--red);}
.dp-month-lbl{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:0.06em;color:var(--ink);}
.dp-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.dp-wd{text-align:center;font-family:'Space Mono',monospace;font-size:8px;color:var(--ink4);padding:3px 0;letter-spacing:0.5px;}
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dp-day{text-align:center;padding:5px 2px;font-size:11px;color:var(--ink2);cursor:pointer;border-radius:1px;transition:background 0.1s;}
.dp-day:hover{background:var(--bg2);}
.dp-day.today{font-weight:500;color:var(--red);}
.dp-day.selected{background:var(--red);color:#fff;}
.dp-day.other-m{color:var(--ink4);opacity:0.4;}
.dp-day.empty{cursor:default;}

.cal-ev{padding:2px 5px;margin-bottom:2px;font-size:10px;line-height:1.3;overflow:hidden;border-radius:2px;transition:opacity 0.12s;flex-shrink:0;display:block;width:100%;box-sizing:border-box;cursor:pointer;}
.cal-ev:hover{opacity:0.7;}
.cal-ev.ev-drag-over{outline:2px dashed var(--red);outline-offset:-1px;}
/* DRAG */
.cal-ev{cursor:grab;}
.cal-ev.dragging{opacity:0.4;cursor:grabbing;}
.cal-cell.drag-over{background:rgba(139,48,21,0.07);outline:2px dashed #8B3015;outline-offset:-2px;}


.dnum{display:flex;flex-direction:row;align-items:center;flex-wrap:nowrap;gap:3px;margin-bottom:2px;overflow:hidden;}
.dnum-n{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink4);width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cal-cell.is-today .dnum-n{background:var(--red);color:#fff;}
.dnum-tag{font-family:'Noto Sans TC',sans-serif;font-size:9px;color:#B85C2C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1;}
.cal-cell.past-day .dnum-n{opacity:0.4;}
.cal-cell.past-day .dnum-tag{opacity:0.4;}

.span-ev{}


</style>
</head>
<body>

<div class="top-nav">
  <a href="index.html" class="back-btn">&#8592; 任務分工</a>
  <div class="nav-sep"></div>
  <div class="nav-title">行事曆</div>
</div>

<div class="brand-tabs">
  <button class="brand-tab active" data-brand="meowling" onclick="calSwitchBrand(this)">🔮 妙靈女子</button>
  <button class="brand-tab" data-brand="hulu" onclick="calSwitchBrand(this)">🎵 葫蘆流</button>
  <button class="brand-tab" data-brand="jennyoga" onclick="calSwitchBrand(this)">🧘 jennyoga</button>
  <button class="brand-tab" data-brand="tongling" onclick="calSwitchBrand(this)">🏮 通通靈</button>
</div>

<div class="content">
  <div class="cal-nav">
    <button class="arr-btn" onclick="calPrev()">&#8592;</button>
    <button class="arr-btn" onclick="calNext()">&#8594;</button>
    <div class="cal-month" id="calMonthH"></div>
    <button class="today-btn" onclick="calGoToday()">今天</button>
    <button class="today-btn" onclick="calExport()" title="匯出資料到剪貼簿">匯出</button>
    <button class="today-btn" onclick="calImport()" title="從剪貼簿匯入資料">匯入</button>
    <button class="add-ev-btn" onclick="calOpenAdd()">＋ 新增</button>
  </div>
  <div class="legend-row" id="legendRow"></div>
  <div class="cal-scroll">
    <div class="cal-wrap">
      <div class="cal-wds">
        <div class="cal-wd">一</div><div class="cal-wd">二</div><div class="cal-wd">三</div>
        <div class="cal-wd">四</div><div class="cal-wd">五</div><div class="cal-wd">六</div><div class="cal-wd">日</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
  </div>
</div>

<div class="modal-ov" id="calModal" onclick="calHandleBg(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-ttl" id="calModalTitle">新增事件</div>
      <button class="modal-x" onclick="calCloseModal()">&#215;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="calFId">
      <div class="f-grp">
        <label class="f-lbl">事件名稱<span class="f-req">*</span></label>
        <input class="f-inp" id="calFTitle" placeholder="例：財神殿 × 四月財運">
      </div>
      <div class="f-grp">
        <label class="f-lbl">內容類型</label>
        <div class="type-grid" id="typeGrid"></div>
      </div>
      <div class="f-row">
        <div class="f-grp">
          <label class="f-lbl">開始日期<span class="f-req">*</span></label>
          <div class="dp-wrap" id="dpWrap">
            <button type="button" class="dp-input" id="dpDisplay" onclick="dpToggle()">選擇日期</button>
            <div class="dp-popup hidden" id="dpPopup">
              <div class="dp-header">
                <button class="dp-nav" onclick="dpPrevMonth()">&#8592;</button>
                <div class="dp-month-lbl" id="dpMonthLbl"></div>
                <button class="dp-nav" onclick="dpNextMonth()">&#8594;</button>
              </div>
              <div class="dp-wds">
                <div class="dp-wd">一</div><div class="dp-wd">二</div><div class="dp-wd">三</div>
                <div class="dp-wd">四</div><div class="dp-wd">五</div><div class="dp-wd">六</div><div class="dp-wd">日</div>
              </div>
              <div class="dp-days" id="dpDays"></div>
            </div>
          </div>
          <input type="hidden" id="calFDate">
        </div>
        <div class="f-grp">
          <label class="f-lbl">結束日期 <span style="color:var(--ink4);font-size:8px;letter-spacing:0;">(選填)</span></label>
          <div class="dp-wrap" id="dpEndWrap">
            <button type="button" class="dp-input" id="dpEndDisplay" onclick="dpEndToggle()">不設定</button>
            <div class="dp-popup hidden" id="dpEndPopup">
              <div class="dp-header">
                <button class="dp-nav" onclick="dpEndPrevMonth()">&#8592;</button>
                <div class="dp-month-lbl" id="dpEndMonthLbl"></div>
                <button class="dp-nav" onclick="dpEndNextMonth()">&#8594;</button>
              </div>
              <div class="dp-wds">
                <div class="dp-wd">一</div><div class="dp-wd">二</div><div class="dp-wd">三</div>
                <div class="dp-wd">四</div><div class="dp-wd">五</div><div class="dp-wd">六</div><div class="dp-wd">日</div>
              </div>
              <div class="dp-days" id="dpEndDays"></div>
            </div>
          </div>
          <button type="button" id="dpEndClear" onclick="dpEndClear()" style="display:none;margin-top:4px;font-size:10px;color:var(--ink3);background:transparent;border:none;cursor:pointer;padding:0;">✕ 清除</button>
          <input type="hidden" id="calFDateEnd">
        </div>
      </div>
      <div class="f-grp">
        <label class="f-lbl">備注</label>
        <input class="f-inp" id="calFKw" placeholder="備注⋯⋯">
      </div>
      <div class="f-grp">
        <label class="f-lbl">發布時間</label>
        <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2);cursor:pointer;">
            <input type="checkbox" id="timeAlldayChk" onchange="toggleTimeInput(this)" style="cursor:pointer;">
            整天
          </label>
          <input class="f-inp" type="time" id="calFTime" value="21:00" style="flex:1;max-width:120px;">
        </div>
      </div>
      <div class="f-grp">
        <label class="f-lbl">腳本 / 拍攝備註</label>
        <textarea class="f-ta" id="calFNote" placeholder="場景、道具、鉤子⋯⋯"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="m-del" id="calDelBtn" onclick="calDeleteEv()" style="display:none">&#10005; 刪除</button>
      <button class="m-dup" id="calDupBtn" onclick="calDuplicateEv()" style="display:none">複製</button>
      <button class="m-g" onclick="calCloseModal()">取消</button>
      <button class="m-p" onclick="calSaveEv()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="calToast"></div>
<script>
const GCAL_CONFIG={CLIENT_ID:'',API_KEY:'',CALENDAR_ID:'primary',SCOPE:'https://www.googleapis.com/auth/calendar.events',ENABLED:false};
let gcalTokenClient=null,gcalAccessToken=null;
function gcalInit() {
  if (!GCAL_CONFIG.ENABLED || !GCAL_CONFIG.CLIENT_ID) return;
  // Load GIS
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = function() {
    gcalTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CONFIG.CLIENT_ID,
      scope: GCAL_CONFIG.SCOPE,
      callback: function(resp) {
        if (resp.error) { console.error('GCal auth error', resp); return; }
        gcalAccessToken = resp.access_token;
        if (window._pendingGcalEvent) {
          gcalCreateEvent(window._pendingGcalEvent);
          window._pendingGcalEvent = null;
        }
      }
    });
  };
  document.head.appendChild(script);
}
function gcalCreateEvent(ev) {
  if (!gcalAccessToken) {
    // Request token first, then will auto-call after auth
    window._pendingGcalEvent = ev;
    gcalTokenClient.requestAccessToken();
    return;
  }
  const time = ev.time || 'allday';
  let start, end;
  if (time === 'allday') {
    start = { date: ev.date };
    end = { date: calNextDay(ev.date) };
  } else {
    const [h, m] = time.split(':');
    const endH = String(parseInt(h) + 1).padStart(2, '0');
    start = { dateTime: ev.date + 'T' + h + ':' + (m||'00') + ':00', timeZone: 'Asia/Taipei' };
    end   = { dateTime: ev.date + 'T' + endH + ':' + (m||'00') + ':00', timeZone: 'Asia/Taipei' };
  }
  const kw = ev.kw || '';
  const note = ev.note || '';
  const body = {
    summary: '【妙靈】' + ev.title,
    description: (kw ? '備注：' + kw + '\n' : '') + (note ? note + '\n' : '') + '發布平台：IG/FB · Threads · TikTok · 小紅書 · YT',
    location: '@iammeowling',
    start: start,
    end: end
  };
  fetch('https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(GCAL_CONFIG.CALENDAR_ID) + '/events', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + gcalAccessToken,

function fallbackGcalUrl(ev) {

  const kw = ev.kw || '';
  const note = ev.note || '';

  if (time === 'allday') {
    dates = ev.date.replace(/-/g,'') + '/' + calNextDay(ev.date).replace(/-/g,'');
  } else {
    const [h, m] = time.split(':');
    const endH = String(parseInt(h)+1).padStart(2,'0');
    const d = ev.date.replace(/-/g,'');
    dates = d + 'T' + h + (m||'00') + '00/' + d + 'T' + endH + (m||'00') + '00';
  }
  const p = new URLSearchParams({action:'TEMPLATE', text:'【妙靈】'+ev.title, dates:dates, details:det, location:'@iammeowling'});
  window.open('https://www.google.com/calendar/render?' + p.toString(), '_blank');
}

function calDeleteEv(){if(!calEditId)return;calDB[calBrand]=(calDB[calBrand]||[]).filter(function(e){return e.id!==calEditId;});calEditId=null;calSave();calRender();calCloseModal();calShowToast('已刪除');}
function calDuplicateEv(){if(!calEditId)return;var orig=(calDB[calBrand]||[]).find(function(e){return e.id===calEditId;});if(!orig)return;var copy={id:calUid(),title:orig.title+' (複製)',type:orig.type,date:orig.date,dateEnd:orig.dateEnd||'',kw:orig.kw,time:orig.time,note:orig.note,gcal:''};calDB[calBrand].push(copy);calSave();calRender();calCloseModal();calShowToast('已複製');}
function calShowToast(msg){var el=document.getElementById('calToast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2000);}
function toggleTimeInput(chk){var inp=document.getElementById('calFTime');if(chk.checked){inp.disabled=true;inp.style.opacity='0.35';calSelTime='allday';}else{inp.disabled=false;inp.style.opacity='1';calSelTime=inp.value||'21:00';}}
var dpY=0,dpM=0,dpSelected='';
function dpFmtDisplay(ds){var p=ds.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
function dpInit(val){var t=val?new Date(val+'T00:00:00'):new Date();dpY=t.getFullYear();dpM=t.getMonth()+1;dpSelected=val||'';dpRender();document.getElementById('dpDisplay').textContent=val?dpFmtDisplay(val):'選擇日期';document.getElementById('calFDate').value=val||'';}
function dpToggle(){var p=document.getElementById('dpPopup');p.classList.toggle('hidden');if(!p.classList.contains('hidden'))dpRender();}
function dpClose(){document.getElementById('dpPopup').classList.add('hidden');}
function dpPrevMonth(){dpM--;if(dpM<1){dpM=12;dpY--;}dpRender();}
function dpNextMonth(){dpM++;if(dpM>12){dpM=1;dpY++;}dpRender();}
function dpRender(){
  document.getElementById('dpMonthLbl').textContent=dpY+'年 '+dpM+'月';
  var days=document.getElementById('dpDays');days.innerHTML='';
  var first=new Date(dpY,dpM-1,1),last=new Date(dpY,dpM,0);var dow=first.getDay();if(dow===0)dow=7;var todayStr=calTodayStr();
  for(var i=1;i<dow;i++){var e=document.createElement('div');e.className='dp-day empty';days.appendChild(e);}
  for(var d=1;d<=last.getDate();d++){var ds=dpY+'-'+String(dpM).padStart(2,'0')+'-'+String(d).padStart(2,'0');var e=document.createElement('div');e.className='dp-day';e.textContent=d;if(ds===todayStr)e.classList.add('today');if(ds===dpSelected)e.classList.add('selected');(function(s){e.onclick=function(){dpSelect(s);};})(ds);days.appendChild(e);}
}
function dpSelect(ds){dpSelected=ds;document.getElementById('dpDisplay').textContent=dpFmtDisplay(ds);document.getElementById('calFDate').value=ds;dpClose();dpRender();}
document.addEventListener('click',function(e){var w=document.getElementById('dpWrap');if(w&&!w.contains(e.target))dpClose();});
var dpEndY=0,dpEndM=0,dpEndSelected='';
function dpEndInit(val){var ref=document.getElementById('calFDate').value;var t=ref?new Date(ref+'T00:00:00'):new Date();dpEndY=t.getFullYear();dpEndM=t.getMonth()+1;dpEndSelected=val||'';dpEndRender();document.getElementById('dpEndDisplay').textContent=val?dpFmtDisplay(val):'不設定';document.getElementById('calFDateEnd').value=val||'';var clr=document.getElementById('dpEndClear');if(clr)clr.style.display=val?'block':'none';}
function dpEndToggle(){var p=document.getElementById('dpEndPopup');p.classList.toggle('hidden');if(!p.classList.contains('hidden'))dpEndRender();}
function dpEndClose(){document.getElementById('dpEndPopup').classList.add('hidden');}
function dpEndPrevMonth(){dpEndM--;if(dpEndM<1){dpEndM=12;dpEndY--;}dpEndRender();}
function dpEndNextMonth(){dpEndM++;if(dpEndM>12){dpEndM=1;dpEndY++;}dpEndRender();}
function dpEndClear(){dpEndSelected='';document.getElementById('dpEndDisplay').textContent='不設定';document.getElementById('calFDateEnd').value='';var clr=document.getElementById('dpEndClear');if(clr)clr.style.display='none';dpEndClose();}
function dpEndRender(){
  document.getElementById('dpEndMonthLbl').textContent=dpEndY+'年 '+dpEndM+'月';
  var days=document.getElementById('dpEndDays');days.innerHTML='';
  var first=new Date(dpEndY,dpEndM-1,1),last=new Date(dpEndY,dpEndM,0);var dow=first.getDay();if(dow===0)dow=7;var startDate=document.getElementById('calFDate').value;
  for(var i=1;i<dow;i++){var e=document.createElement('div');e.className='dp-day empty';days.appendChild(e);}
  for(var d=1;d<=last.getDate();d++){var ds=dpEndY+'-'+String(dpEndM).padStart(2,'0')+'-'+String(d).padStart(2,'0');var e=document.createElement('div');e.className='dp-day';e.textContent=d;if(ds===dpEndSelected)e.classList.add('selected');if(startDate&&ds<startDate){e.style.opacity='0.3';e.style.cursor='not-allowed';}else{(function(s){e.onclick=function(){dpEndSelectDate(s);};})(ds);}days.appendChild(e);}
}
function dpEndSelectDate(ds){dpEndSelected=ds;document.getElementById('dpEndDisplay').textContent=dpFmtDisplay(ds);document.getElementById('calFDateEnd').value=ds;var clr=document.getElementById('dpEndClear');if(clr)clr.style.display='block';dpEndClose();dpEndRender();}
document.addEventListener('click',function(e){var w=document.getElementById('dpEndWrap');if(w&&!w.contains(e.target))dpEndClose();});
(function(){
  var row=document.getElementById('legendRow');
  EV_TYPES.forEach(function(t){var item=document.createElement('div');item.className='leg-item';item.onclick=function(){calToggleFilter(t.id,item);};var dot=document.createElement('div');dot.className='leg-dot';dot.style.background=t.color+'25';dot.style.border='1.5px solid '+t.color;var lbl=document.createElement('span');lbl.className='leg-label';lbl.textContent=t.label;item.appendChild(dot);item.appendChild(lbl);row.appendChild(item);});
  var tg=document.getElementById('typeGrid');
  EV_TYPES.forEach(function(t){var btn=document.createElement('button');btn.className='type-btn';btn.dataset.t=t.id;btn.textContent=t.label;btn.style.background=t.color+'15';btn.style.color=t.color;btn.style.borderColor=t.color+'60';btn.onclick=function(){setTypeButtons(t.id,true);};tg.appendChild(btn);});
})();

function calExport(){
  var data=localStorage.getItem(CAL_KEY)||'{}';
  navigator.clipboard.writeText(data).then(function(){
    calShowToast('已複製！去 Vercel 頁面點「匯入」貼上');
  }).catch(function(){
    prompt('複製這段資料：',data);
  });
}

function calImport(){
  var data=prompt('貼上資料：');
  if(!data)return;
  try{
    JSON.parse(data);
    localStorage.setItem(CAL_KEY,data);
    calLoad();calRender();
    calShowToast('匯入成功！');
  }catch(e){
    calShowToast('格式錯誤，請重試');
  }
}

calLoad();
calRender();

</script>
</body>
</html>
