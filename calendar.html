<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌工作站 · 行事曆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400&family=Space+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--white:#fff;--bg:#f7f6f4;--bg2:#f0eeeb;--line:#d8d5d0;--line2:#ece9e4;--ink:#1a1917;--ink2:#4a4840;--ink3:#9a9890;--ink4:#c8c5c0;--red:#8B3015;--red2:#6B2010;}
html,body{height:100%;font-size:12px;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-weight:300;display:flex;flex-direction:column;overflow:hidden;}

/* ===== 頭像選擇頁（Netflix 風格滿版） ===== */
.picker-scr{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto;animation:pickerFade 0.4s ease-out;}
.picker-scr.hidden{display:none;}
@keyframes pickerFade{from{opacity:0;}to{opacity:1;}}
.picker-title{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:300;letter-spacing:0.15em;color:#fff;margin-bottom:8px;text-align:center;}
.picker-sub{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:50px;text-align:center;}
.picker-grid{display:flex;flex-direction:row;flex-wrap:nowrap;gap:20px;max-width:100%;width:100%;justify-content:center;align-items:center;overflow-x:auto;padding:10px 20px;-webkit-overflow-scrolling:touch;}
.picker-card{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;padding:12px;border-radius:8px;transition:all 0.2s ease;background:transparent;border:none;color:inherit;font-family:inherit;flex-shrink:0;}
.picker-card:hover{background:rgba(255,255,255,0.04);transform:translateY(-3px);}
.picker-avatar{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;background:var(--bg);border:2px solid transparent;transition:all 0.2s ease;}
.picker-card:hover .picker-avatar{border-color:var(--red);transform:scale(1.05);}
.picker-name{font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,0.75);letter-spacing:0.08em;}
.picker-card:hover .picker-name{color:#fff;}
@media(max-width:480px){
  .picker-title{font-size:22px;}
  .picker-sub{margin-bottom:30px;}
  .picker-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px 10px;
    padding:10px 24px;
    justify-items:center;
    overflow-x:visible;
  }
  .picker-avatar{width:68px;height:68px;font-size:32px;}
  .picker-name{font-size:12px;}
  .picker-card{padding:10px 8px;gap:8px;width:100%;}
}

/* TOP NAV */
.top-nav{height:46px;background:var(--ink);display:flex;align-items:center;padding:0 max(16px,2vw);gap:16px;flex-shrink:0;}
.back-btn{font-family:'Space Mono',monospace;font-size:15px;font-weight:400;letter-spacing:1px;color:#fff;text-decoration:none;text-transform:uppercase;transition:opacity 0.2s;}
.back-btn:hover{opacity:0.75;}
.nav-sep{width:1px;height:16px;background:rgba(255,255,255,0.2);}
.nav-title{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2.5px;color:rgba(255,255,255,0.5);text-transform:uppercase;}

/* ===== picker：預選高亮 + 確認按鈕 ===== */
.picker-card.preselected .picker-avatar{border-color:var(--red);box-shadow:0 0 0 4px rgba(139,48,21,0.25);transform:scale(1.05);}
.picker-card.preselected .picker-name{color:#fff;font-weight:400;}
/* 有人被預選時，其他卡片變淺（淺灰 + 低透明度） */
.picker-grid.has-preselected .picker-card:not(.preselected){opacity:0.35;}
.picker-grid.has-preselected .picker-card:not(.preselected) .picker-avatar{filter:grayscale(0.6);background:rgba(255,255,255,0.08);}
.picker-grid.has-preselected .picker-card:not(.preselected) .picker-name{color:rgba(255,255,255,0.4);}
.picker-grid.has-preselected .picker-card:not(.preselected):hover{opacity:0.7;}
.picker-confirm-wrap{margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.picker-hint{font-family:'Noto Sans TC',sans-serif;font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.1em;}
.picker-confirm{font-family:'Noto Sans TC',sans-serif;font-size:14px;letter-spacing:0.15em;padding:12px 42px;background:var(--red);color:#fff;border:none;border-radius:2px;cursor:pointer;transition:all 0.2s;font-weight:400;}
.picker-confirm:hover{background:var(--red2);transform:translateY(-1px);}
.picker-confirm:disabled{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);cursor:not-allowed;transform:none;}
@media(max-width:480px){
  .picker-confirm-wrap{margin-top:24px;gap:10px;}
  .picker-confirm{font-size:13px;padding:10px 32px;}
}

/* BRAND TABS */
.brand-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--white);padding:0 max(16px,2vw);flex-shrink:0;-webkit-overflow-scrolling:touch;align-items:center;}
.brand-tab{display:flex;align-items:center;gap:6px;padding:14px 20px;font-size:17px;color:var(--ink3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;}
.brand-tab:hover{color:var(--ink2);}
.brand-tab.active{color:var(--ink);border-bottom-color:var(--red);}

/* ===== 右上角編輯者顯示（純文字 + 小頭像） ===== */
.editor-display{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 10px;flex-shrink:0;user-select:none;}
.editor-avatar-sm{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg2);border:1px solid var(--line);flex-shrink:0;}
.editor-name-sm{font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--ink2);letter-spacing:0.05em;white-space:nowrap;}
.editor-lbl-sm{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;white-space:nowrap;margin-right:2px;}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 max(16px,2vw);max-width:1800px;width:100%;margin:0 auto;box-sizing:border-box;}

/* CAL NAV */
.cal-nav{display:flex;align-items:center;gap:8px;padding:10px 0 8px;flex-shrink:0;}
.arr-btn{width:34px;height:34px;background:transparent;border:1px solid var(--line);color:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0;transition:all 0.12s;}
.arr-btn:hover{border-color:var(--red);color:var(--red);}
.cal-month{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:300;letter-spacing:0.1em;color:var(--ink);flex:1;}
.today-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;background:transparent;border:1px solid var(--line);color:var(--ink3);cursor:pointer;transition:all 0.12s;}
.today-btn:hover{border-color:var(--red);color:var(--red);}
.add-ev-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 18px;background:var(--red);color:#fff;border:none;cursor:pointer;transition:background 0.2s;}
.add-ev-btn:hover{background:var(--red2);}

/* LEGEND */
.legend-row{display:flex;align-items:center;gap:4px;padding:5px 0 7px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid var(--line2);}
.leg-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 7px;transition:all 0.15s;border-radius:2px;border:1px solid transparent;}
.leg-item:hover{background:var(--bg2);}
.leg-item.dimmed{opacity:0.28;}
.leg-dot{width:13px;height:13px;border-radius:2px;flex-shrink:0;}
.leg-label{font-size:14px;color:var(--ink2);}

/* CALENDAR GRID */
.cal-scroll{flex:1;overflow-y:auto;padding-bottom:24px;}
.cal-wrap{border:1px solid var(--line);background:var(--white);margin-top:8px;position:relative;}
.cal-cell{padding:7px 6px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);overflow:hidden;display:flex;flex-direction:column;height:340px;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:340px;}
/* 日期數字區（頂部）不滾動，事件區往下滑 */
.cal-cell .dnum{flex-shrink:0;}
.cal-cell .cal-ev-list{flex:1;overflow-y:auto;overflow-x:hidden;padding-right:2px;}
/* 客製化細捲軸，不要搶視覺 */
.cal-cell .cal-ev-list::-webkit-scrollbar{width:4px;}
.cal-cell .cal-ev-list::-webkit-scrollbar-track{background:transparent;}
.cal-cell .cal-ev-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
.cal-cell .cal-ev-list::-webkit-scrollbar-thumb:hover{background:var(--ink4);}

.span-ev{}

.cal-wds{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.cal-wd{text-align:center;padding:8px 0;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;letter-spacing:0.04em;color:var(--ink);}



@media(min-width:600px){}
.cal-cell:hover{background:rgba(26,25,23,0.015);}
.cal-cell.past-day{background:#f5f4f2;}
.cal-cell.past-day 
.cal-cell.past-day .cal-ev{opacity:0.4;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-m{background:var(--bg2);opacity:0.4;}

.cal-ev:hover{opacity:0.7;}
.cal-ev.ev-drag-over{outline:2px dashed var(--red);outline-offset:-1px;}
.more-ev{font-family:'Space Mono',monospace;font-size:8px;color:var(--ink4);padding:1px 4px;cursor:pointer;}
.cal-cell.dense .dnum{font-size:11px;}
.cal-cell.dense .dnum-n{width:20px;height:20px;font-size:11px;}
.cal-cell.dense .dnum-tag{font-size:10px;}
.cal-cell.dense .cal-ev{font-size:15px;padding:2px 5px;margin-bottom:2px;}
.cal-cell.dense .cal-ev span,.cal-cell.dense .cal-ev div{font-size:15px;}
.more-ev:hover{color:var(--red);}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(26,23,20,0.48);z-index:800;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.18s;}
@media(min-width:540px){.modal-ov{align-items:center;}}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;transform:translateY(16px);transition:transform 0.2s;}
@media(min-width:540px){.modal{border-radius:0;border-bottom:1px solid var(--line);transform:translateY(8px);}}
.modal-ov.open .modal{transform:translateY(0);}
.modal-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1;}
.modal-ttl{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:400;letter-spacing:0.08em;color:var(--ink);}
.modal-x{background:transparent;border:1px solid var(--line);color:var(--ink3);width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.modal-x:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:14px 16px;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;align-items:center;position:sticky;bottom:0;background:var(--bg);}

/* FORM */
.f-lbl{display:block;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin-bottom:5px;}
.f-req{color:var(--red);margin-left:2px;}
.f-inp,.f-ta{width:100%;padding:8px 10px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;transition:border-color 0.18s;}
.f-inp:focus,.f-ta:focus{border-color:var(--red);background:#fff;}
.f-inp::placeholder,.f-ta::placeholder{color:var(--ink4);font-size:11px;}
.f-ta{resize:vertical;min-height:56px;line-height:1.8;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-grp{margin-bottom:12px;}

/* TYPE BUTTONS */
.type-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.type-btn{padding:5px 10px;font-size:11px;border:1px solid;background:transparent;cursor:pointer;transition:all 0.12s;font-family:'Noto Sans TC',sans-serif;border-radius:2px;}

/* TIME BUTTONS */
.time-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.time-btn{padding:5px 11px;font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,0.6);color:var(--ink2);cursor:pointer;transition:all 0.12s;font-family:'Space Mono',monospace;border-radius:2px;}
.time-btn:hover{border-color:var(--ink2);}
.time-btn.sel{background:var(--ink);color:#fff;border-color:var(--ink);}

/* PLATFORM LIST */
.plat-list{margin-top:8px;display:flex;flex-direction:column;gap:2px;}
.plat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:var(--bg2);border-radius:2px;}
.plat-name{font-size:11px;color:var(--ink2);}
.plat-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink3);}


/* MODAL BUTTONS */
.m-p{padding:7px 16px;background:var(--red);color:#fff;border:none;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.m-p:hover{background:var(--red2);}
.m-g{padding:7px 12px;background:transparent;border:1px solid var(--line);color:var(--ink3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
.m-g:hover{border-color:var(--ink2);color:var(--ink2);}
.m-del{padding:7px 10px;background:transparent;border:1px solid rgba(163,45,45,0.25);color:#8B2020;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;}
.m-del:hover{background:rgba(163,45,45,0.05);border-color:#8B2020;}
.m-dup{padding:7px 10px;background:transparent;border:1px solid var(--line);color:var(--ink3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;margin-right:auto;}
.m-dup:hover{border-color:var(--ink2);color:var(--ink2);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:900;background:var(--ink);color:rgba(255,255,255,0.9);padding:10px 18px;font-family:'Noto Sans TC',sans-serif;font-size:13px;letter-spacing:0.5px;opacity:0;transform:translateY(5px);transition:all 0.2s;pointer-events:none;max-width:320px;border-radius:3px;}
.toast.show{opacity:1;transform:translateY(0);}
/* CUSTOM DATE PICKER */
.dp-wrap{position:relative;}
.dp-input{width:100%;padding:8px 10px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;cursor:pointer;transition:border-color 0.18s;text-align:left;}
.dp-input:focus{border-color:var(--red);}
.dp-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:999;background:var(--white);border:1px solid var(--line);padding:10px;width:240px;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.dp-popup.hidden{display:none;}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dp-nav{background:transparent;border:1px solid var(--line);color:var(--ink3);width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;}
.dp-nav:hover{border-color:var(--red);color:var(--red);}
.dp-month-lbl{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:0.06em;color:var(--ink);}
.dp-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.dp-wd{text-align:center;font-family:'Space Mono',monospace;font-size:8px;color:var(--ink4);padding:3px 0;letter-spacing:0.5px;}
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dp-day{text-align:center;padding:5px 2px;font-size:11px;color:var(--ink2);cursor:pointer;border-radius:1px;transition:background 0.1s;}
.dp-day:hover{background:var(--bg2);}
.dp-day.today{font-weight:500;color:var(--red);}
.dp-day.selected{background:var(--red);color:#fff;}
.dp-day.other-m{color:var(--ink4);opacity:0.4;}
.dp-day.empty{cursor:default;}

.cal-ev{padding:4px 7px;margin-bottom:3px;font-size:16px;line-height:1.3;overflow-x:auto;overflow-y:hidden;border-radius:2px;transition:opacity 0.12s;flex-shrink:0;display:block;width:100%;box-sizing:border-box;cursor:pointer;scrollbar-width:none;}
.ev-title-span{white-space:nowrap;font-size:16px;}
.cal-ev::-webkit-scrollbar{display:none;}
.cal-ev:hover{opacity:0.7;}
.cal-ev.ev-drag-over{outline:2px dashed var(--red);outline-offset:-1px;}
/* DRAG */
.cal-ev{cursor:grab;}
.cal-ev.dragging{opacity:0.4;cursor:grabbing;}
.cal-cell.drag-over{background:rgba(139,48,21,0.07);outline:2px dashed #8B3015;outline-offset:-2px;}

/* ===== 備注區塊 ===== */
.remarks-section{margin-top:4px;}
.remarks-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.remark-item{border:1px solid var(--line);border-radius:3px;padding:10px 12px;background:rgba(255,255,255,0.6);position:relative;}
.remark-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.remark-remove-btn{background:transparent;border:none;color:var(--ink4);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;}
.remark-remove-btn:hover{color:var(--red);}
.remark-assignee-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.remark-assignee-btn{padding:3px 9px;font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,0.6);color:var(--ink2);cursor:pointer;transition:all 0.12s;font-family:'Noto Sans TC',sans-serif;border-radius:20px;}
.remark-assignee-btn:hover{border-color:var(--ink2);}
.remark-assignee-btn.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
.remark-due-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.remark-due-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;white-space:nowrap;}
.remark-due-inp{padding:4px 8px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:11px;outline:none;border-radius:2px;cursor:pointer;}
.remark-due-inp:focus{border-color:var(--red);}
.remark-text-inp{width:100%;padding:6px 8px;border:1px solid var(--line);border-bottom-color:rgba(26,23,20,0.28);background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;resize:vertical;min-height:44px;line-height:1.7;}
.remark-text-inp:focus{border-color:var(--red);}
.remark-add-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:transparent;border:1px dashed var(--line);color:var(--ink3);font-family:'Noto Sans TC',sans-serif;font-size:11px;cursor:pointer;width:100%;justify-content:center;margin-top:4px;border-radius:2px;transition:all 0.15s;}
.remark-add-btn:hover{border-color:var(--red);color:var(--red);}

/* ===== 近期任務面板 ===== */
.tasks-panel{position:fixed;top:0;right:0;width:340px;max-width:92vw;height:100%;background:var(--white);border-left:1px solid var(--line);z-index:700;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s ease;box-shadow:-4px 0 24px rgba(0,0,0,0.08);}
.tasks-panel.open{transform:translateX(0);}
.tasks-panel-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);}
.tasks-panel-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:400;letter-spacing:0.08em;color:var(--ink);}
.tasks-panel-who{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--ink3);margin-top:2px;}
.tasks-panel-x{background:transparent;border:1px solid var(--line);color:var(--ink3);width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;}
.tasks-panel-x:hover{border-color:var(--red);color:var(--red);}

.task-item{padding:10px 12px;border:1px solid var(--line2);border-radius:3px;margin-bottom:8px;background:var(--bg);position:relative;transition:opacity 0.2s;}
.task-item.done{opacity:0.45;}
.task-item.done .task-text{text-decoration:line-through;color:var(--ink3);}
.task-item.overdue{border-left:3px solid #C0392B;}

.task-check{width:16px;height:16px;border:1.5px solid var(--line);border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all 0.15s;background:#fff;}
.task-check:hover{border-color:var(--red);}
.task-check.checked{background:var(--ink);border-color:var(--ink);}
.task-check.checked::after{content:'✓';font-size:10px;color:#fff;line-height:1;}
.task-text{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--ink);line-height:1.6;flex:1;}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:6px;padding-left:24px;flex-wrap:wrap;}
.task-ev-title{font-size:10px;color:var(--ink3);font-family:'Noto Sans TC',sans-serif;}
.task-due{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.5px;}
.task-due.soon{color:#B85C2C;}
.task-due.overdue{color:#C0392B;}
.task-due.ok{color:var(--ink3);}
.task-countdown{font-family:'Space Mono',monospace;font-size:9px;padding:1px 5px;border-radius:10px;white-space:nowrap;}
.task-countdown.soon{background:#FFF0E6;color:#B85C2C;}
.task-countdown.overdue{background:#FFE8E8;color:#C0392B;}
.task-countdown.ok{background:var(--bg2);color:var(--ink3);}
.tasks-empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:12px;line-height:2;}
.tasks-section-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);padding:8px 0 4px;margin-bottom:4px;border-bottom:1px solid var(--line2);}

<script>
// ============================================================
// 編輯者管理（Netflix 風頭像選擇 + 右上角顯示）
// ============================================================
const EDITOR_KEY='wk_editor';
const EDITORS=[
  {name:'妙靈老師',emoji:'🪷'},
  {name:'Jenny老師',emoji:'🧘🏻'},
  {name:'AI王',emoji:'🧝🏼‍♂️'},
  {name:'Bessie',emoji:'🐕'},
  {name:'Ferris',emoji:'👑'},
  {name:'訪客',emoji:'👤'}
];
let currentEditor=localStorage.getItem(EDITOR_KEY)||'';
let pickerCandidate='';  // 預選中、尚未確認的編輯者

// 取得編輯者的 emoji（給右上角顯示用）
function getEditorEmoji(name){
  var found=EDITORS.find(function(e){return e.name===name;});
  return found?found.emoji:'👤';
}

// 更新右上角編輯者顯示
function refreshEditorDisplay(){
  var avatarEl=document.getElementById('editorAvatarSm');
  var nameEl=document.getElementById('editorNameSm');
  if(!avatarEl||!nameEl)return;
  if(currentEditor){
    avatarEl.textContent=getEditorEmoji(currentEditor);
    nameEl.textContent=currentEditor;
  }else{
    avatarEl.textContent='👤';
    nameEl.textContent='－';
  }
}

// 點某個頭像：設為「預選」狀態（還沒真正進入）
function pickerSelect(name){
  pickerCandidate=name;
  // 更新所有卡片的高亮狀態
  document.querySelectorAll('.picker-card').forEach(function(card){
    card.classList.toggle('preselected',card.dataset.editor===name);
  });
  // grid 加上 has-preselected，讓其他卡片變淺
  var grid=document.getElementById('pickerGrid');
  if(grid)grid.classList.add('has-preselected');
  // 解鎖確認按鈕
  var btn=document.getElementById('pickerConfirmBtn');
  if(btn)btn.disabled=false;
}

// 按下「確認進入」：真正寫入 localStorage 並進入行事曆
function pickerConfirm(){
  if(!pickerCandidate)return;
  currentEditor=pickerCandidate;
  localStorage.setItem(EDITOR_KEY,pickerCandidate);
  refreshEditorDisplay();
  var scr=document.getElementById('pickerScr');
  if(scr){
    scr.style.transition='opacity 0.3s ease';
    scr.style.opacity='0';
    setTimeout(function(){scr.classList.add('hidden');scr.style.opacity='';},300);
  }
  calShowToast('歡迎，'+currentEditor+' ✨');
}

// 建立頭像選擇頁的卡片
function buildPicker(){
  var grid=document.getElementById('pickerGrid');
  if(!grid)return;
  grid.innerHTML='';
  EDITORS.forEach(function(e){
    var card=document.createElement('button');
    card.className='picker-card';
    card.dataset.editor=e.name;
    card.onclick=function(){pickerSelect(e.name);};

const GCAL_API='/api/gcal-sync';
const GCAL_ENABLED=true;

async function gcalCall(action,data){
  if(!GCAL_ENABLED)return{ok:false,skipped:true};
  try{
    var params=new URLSearchParams({action:action});
    Object.keys(data||{}).forEach(function(k){
      if(data[k]!==undefined&&data[k]!==null)params.append(k,data[k]);
    });
    var resp=await fetch(GCAL_API+'?'+params.toString());
    var json=await resp.json();
    return json;
  }catch(err){
    console.error('gcalCall error:',err);
    return{ok:false,error:err.message};
  }
}

async function gcalSyncCreate(ev){
  if(calBrand==='all')return;
  var brandName={meowling:'妙靈',hulu:'葫蘆流',tongling:'通通靈',jennyoga:'jennyoga',peregary:'Père Gary',oldsoul:'Old Soul'}[calBrand]||'';
  var result=await gcalCall('create',{
    title:ev.title,date:ev.date,dateEnd:ev.dateEnd||'',time:ev.time||'allday',
    kw:ev.kw||'',note:ev.note||'',brand:brandName,editor:currentEditor||'未署名',
    clientUid:ev.id  // 冪等鍵：避免 API retry 造成 Calendar 重複事件
  });
  if(result.ok&&result.gcalId){
    var arr=calDB[calBrand]||[];
    var idx=arr.findIndex(function(e){return e.id===ev.id;});
    if(idx>-1){arr[idx].gcalId=result.gcalId;calSave();}
    calShowToast('✓ 已同步至 '+brandName+' Google 日曆');
  }else if(!result.skipped){
    console.error('GCal 同步失敗:',result);
    calShowToast('⚠ Google 日曆同步失敗,本地已儲存');
  }
}

function calDataCopyToClipboard(){
  var txt=document.getElementById('calDataTxt');
  // 先選取文字，無論是否支援 clipboard API 都能讓使用者手動複製
  txt.select();
  txt.setSelectionRange(0,999999);
  var done=false;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt.value).then(function(){
      calShowToast('✓ 已複製到剪貼簿');
      done=true;
    }).catch(function(){
      // fallback 到 document.execCommand
      try{
        if(document.execCommand('copy')){calShowToast('✓ 已複製到剪貼簿');done=true;}
      }catch(e){}
      if(!done)calShowToast('請手動按 Cmd/Ctrl+C 複製');
    });
  }else{
    try{
      if(document.execCommand('copy')){calShowToast('✓ 已複製到剪貼簿');done=true;}
    }catch(e){}
    if(!done)calShowToast('請手動按 Cmd/Ctrl+C 複製');
  }
}

function calDataDownload(){
  var txt=document.getElementById('calDataTxt').value;
  var blob=new Blob([txt],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var now=new Date();
  var ts=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  a.href=url;a.download='walkin-calendar-backup-'+ts+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  calShowToast('✓ 備份檔已下載');
}

  btnDo.onclick=function(){calDataDoImport();};

function calDataDoImport(){
  var data=document.getElementById('calDataTxt').value.trim();
  if(!data){calShowToast('請先貼上資料');return;}
  var parsed;
  try{
    parsed=JSON.parse(data);
  }catch(e){
    calShowToast('✗ 格式錯誤：不是有效的 JSON');return;
  }
  if(typeof parsed!=='object'||parsed===null||Array.isArray(parsed)){
    calShowToast('✗ 格式錯誤：應為品牌物件');return;
  }
  // 驗證是否有四個品牌的 key（允許部分缺漏）
  var VALID_BRANDS=['meowling','hulu','tongling','jennyoga','peregary','oldsoul'];
  var hasAnyBrand=VALID_BRANDS.some(function(b){return Array.isArray(parsed[b]);});
  if(!hasAnyBrand){
    calShowToast('✗ 找不到任何品牌資料（meowling/hulu/tongling/jennyoga/peregary/oldsoul）');return;
  }
  // 補齊缺少的品牌為空陣列
  VALID_BRANDS.forEach(function(b){if(!Array.isArray(parsed[b]))parsed[b]=[];});

  // 寫入 localStorage
  var cleanJson=JSON.stringify(parsed);
  localStorage.setItem(CAL_KEY,cleanJson);
  calDB=parsed;

  // 同步推送到 Firebase（如果有連線）—— 避免雲端舊資料倒回來覆蓋
  if(window._fbSave){
    try{window._fbSave(JSON.parse(cleanJson));}catch(e){console.warn('Firebase sync failed',e);}
  }

  calRender();
  calDataCloseModal();
  var total=0;
  VALID_BRANDS.forEach(function(b){total+=parsed[b].length;});
  calShowToast('✓ 匯入成功，共 '+total+' 筆資料');
}

// ============================================================
// 備注（Remarks）管理
// ============================================================
// REMARK_EDITORS：只含正式編輯者，不含訪客
const REMARK_EDITORS=['妙靈老師','Jenny老師','AI王','Bessie','Ferris'];

// 當前 modal 正在編輯的 remarks（暫存狀態，儲存時才寫入事件）
let _remarks=[];  // [{id,text,assignee,dueDate,done}]

function remarkUid(){return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function remarkAdd(initData){
  // initData 可選，用於「編輯事件時載入已有備注」
  var evDate=document.getElementById('calFDate').value||calTodayStr();
  var item={
    id:initData&&initData.id?initData.id:remarkUid(),
    text:initData&&initData.text!=null?initData.text:'',
    assignee:initData&&initData.assignee?(Array.isArray(initData.assignee)?initData.assignee:[initData.assignee].filter(Boolean)):[],
    dueDate:initData&&initData.dueDate?initData.dueDate:evDate,
    done:initData&&initData.done?initData.done:false
  };
  _remarks.push(item);
  remarkRenderAll();
}

function remarkRemove(rid){
  _remarks=_remarks.filter(function(r){return r.id!==rid;});
  remarkRenderAll();
}

function remarkSetAssignee(rid,name){
  var r=_remarks.find(function(x){return x.id===rid;});
  if(!r)return;
  if(!Array.isArray(r.assignee))r.assignee=r.assignee?[r.assignee]:[];
  var idx=r.assignee.indexOf(name);
  if(idx>=0){r.assignee.splice(idx,1);}else{r.assignee.push(name);}
  remarkRenderAll();
}

function remarkRenderAll(){
  var list=document.getElementById('remarksList');
  if(!list)return;
  list.innerHTML='';
  _remarks.forEach(function(r,idx){
    var item=document.createElement('div');
    item.className='remark-item';

    // header：序號 + 刪除
    var hdr=document.createElement('div');
    hdr.className='remark-item-header';
    var lbl=document.createElement('span');
    lbl.style.cssText='font-family:"Space Mono",monospace;font-size:8px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;';
    lbl.textContent='備注 '+(idx+1);
    var rmBtn=document.createElement('button');
    rmBtn.type='button';
    rmBtn.className='remark-remove-btn';rmBtn.textContent='✕';rmBtn.title='移除此備注';
    (function(rid){rmBtn.onclick=function(){remarkRemove(rid);};})(r.id);
    hdr.appendChild(lbl);hdr.appendChild(rmBtn);
    item.appendChild(hdr);

    // 負責人標籤
    var assigneeRow=document.createElement('div');
    assigneeRow.className='remark-assignee-row';
    var assignees=Array.isArray(r.assignee)?r.assignee:(r.assignee?[r.assignee]:[]);
    REMARK_EDITORS.forEach(function(name){
      var btn=document.createElement('button');
      btn.type='button';
      btn.className='remark-assignee-btn'+(assignees.indexOf(name)>=0?' sel':'');
      btn.textContent=name;
      (function(rid,n){btn.onclick=function(){remarkSetAssignee(rid,n);};})(r.id,name);
      assigneeRow.appendChild(btn);
    });
    item.appendChild(assigneeRow);

    // 到期日
    var dueRow=document.createElement('div');
    dueRow.className='remark-due-row';
    var dueLbl=document.createElement('span');
    dueLbl.className='remark-due-lbl';dueLbl.textContent='到期日';
    var dueInp=document.createElement('input');
    dueInp.type='date';dueInp.className='remark-due-inp';dueInp.value=r.dueDate||'';
    (function(rid){dueInp.onchange=function(){
      var rx=_remarks.find(function(x){return x.id===rid;});
      if(rx)rx.dueDate=dueInp.value;
    };})(r.id);
    dueRow.appendChild(dueLbl);dueRow.appendChild(dueInp);
    item.appendChild(dueRow);

    // 備注文字
    var ta=document.createElement('textarea');
    ta.className='remark-text-inp';ta.placeholder='備注內容⋯⋯';ta.value=r.text||'';
    (function(rid){ta.oninput=function(){
      var rx=_remarks.find(function(x){return x.id===rid;});
      if(rx)rx.text=ta.value;
    };})(r.id);
    item.appendChild(ta);

    list.appendChild(item);
  });
}

// 初始化 remarks（開啟 modal 時呼叫）
function remarkInit(evRemarks){
  _remarks=[];
  if(evRemarks&&evRemarks.length>0){
    evRemarks.forEach(function(r){remarkAdd(r);});
  } else {
    remarkRenderAll(); // 即使沒有備注也要清空 DOM
  }
}

// 取得當前 _remarks 的乾淨副本（存入事件前同步 textarea 值）
function remarkCollect(){
  // 直接回傳 _remarks（已透過 oninput/onchange 即時更新）
  return _remarks.map(function(r){
    return {id:r.id,text:r.text,assignee:r.assignee,dueDate:r.dueDate,done:r.done||false};
  });
}

// ============================================================
// 近期任務面板
// ============================================================
// 任務完成狀態存在 localStorage（key: remarks done state），格式：{[remarkId]: true}
const TASKS_DONE_KEY='wk_tasks_done';
function tasksGetDone(){
  try{return JSON.parse(localStorage.getItem(TASKS_DONE_KEY))||{};}catch(e){return {};}
}
function tasksSetDone(rid,val){
  var done=tasksGetDone();
  if(val){
    done[rid]=Date.now(); // 記錄完成時間戳
  } else {
    delete done[rid]; // 取消勾選就移除
  }
  localStorage.setItem(TASKS_DONE_KEY,JSON.stringify(done));
}

function tasksOpen(){
  if(!currentEditor||currentEditor==='訪客'){
    calShowToast('請先選擇編輯者');return;
  }
  var panel=document.getElementById('tasksPanel');
  var overlay=document.getElementById('tasksOverlay');
  document.getElementById('tasksPanelWho').textContent=getEditorEmoji(currentEditor)+' '+currentEditor+' 的任務';
  tasksRender();
  panel.classList.add('open');
  overlay.classList.add('open');
}

function tasksClose(){
  document.getElementById('tasksPanel').classList.remove('open');
  document.getElementById('tasksOverlay').classList.remove('open');
}

function tasksRender(){
  var body=document.getElementById('tasksPanelBody');
  if(!body)return;
  body.innerHTML='';
  var today=calTodayStr();
  var done=tasksGetDone();
  var TEN_DAYS=10*24*60*60*1000;

  // 收集所有品牌、所有事件中，分配給 currentEditor 的 remarks
  var items=[];
  ['meowling','hulu','tongling','jennyoga','peregary','oldsoul'].forEach(function(b){
    (calDB[b]||[]).forEach(function(ev){
      (ev.remarks||[]).forEach(function(r){
        var assignees=Array.isArray(r.assignee)?r.assignee:(r.assignee?[r.assignee]:[]);
        if(assignees.indexOf(currentEditor)<0)return;
        var doneTs=done[r.id]; // timestamp 或 undefined
        var isDone=!!(doneTs||r.done);
        // 完成超過 10 天就不顯示
        if(doneTs&&(Date.now()-doneTs)>TEN_DAYS)return;
        items.push({
          rid:r.id,
          text:r.text,
          dueDate:r.dueDate||ev.date,
          evTitle:ev.title,
          evKw:ev.kw||'',
          evDate:ev.date,
          brand:b,
          isDone:isDone,
          doneTs:doneTs||0
        });
      });
    });
  });

  if(items.length===0){
    var empty=document.createElement('div');
    empty.className='tasks-empty';
    empty.innerHTML='目前沒有任務 ✨<br><span style="font-size:10px;">備注分配給你之後<br>會出現在這裡</span>';
    body.appendChild(empty);
    return;
  }

  // 分組：未完成 vs 完成
  var undone=items.filter(function(x){return !x.isDone;});
  var doneItems=items.filter(function(x){return x.isDone;});

  // 未完成按到期日排序（過期的排前面）
  undone.sort(function(a,b){return a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:0;});
  doneItems.sort(function(a,b){return a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:0;});

  function renderTaskItem(t){
    var diffDays=Math.ceil((new Date(t.dueDate+'T00:00:00')-new Date(today+'T00:00:00'))/(1000*60*60*24));
    var isOverdue=diffDays<0&&!t.isDone;
    var isSoon=diffDays>=0&&diffDays<=3&&!t.isDone;
    var dueCls=isOverdue?'overdue':isSoon?'soon':'ok';

    var item=document.createElement('div');
    item.className='task-item'+(t.isDone?' done':'')+(isOverdue?' overdue':'');

    // 第一行：打勾 + 品牌emoji + 事件名稱｜倒數 日期
    var row1=document.createElement('div');
    row1.style.cssText='display:flex;align-items:center;gap:8px;';

    var chk=document.createElement('div');
    chk.className='task-check'+(t.isDone?' checked':'');
    (function(rid,isDone){
      chk.onclick=function(){
        var newDone=!isDone;
        tasksSetDone(rid,newDone);
        var updated=false;
        ['meowling','hulu','tongling','jennyoga','peregary','oldsoul'].forEach(function(b){
          (calDB[b]||[]).forEach(function(ev){
            (ev.remarks||[]).forEach(function(r){
              if(r.id===rid){r.done=newDone;updated=true;}
            });
          });
        });
        if(updated){calSave();}
        tasksRender();
      };
    })(t.rid,t.isDone);
    // 日期星期
    var dueD=new Date(t.dueDate+'T00:00:00');
    var WD_CN=['日','一','二','三','四','五','六'];
    var dueDateStr=parseInt(t.dueDate.slice(5,7))+'/'+(parseInt(t.dueDate.slice(8)))+' ('+WD_CN[dueD.getDay()]+')';
    var cdTxt=isOverdue?'逾期 '+Math.abs(diffDays)+'天':diffDays===0?'今天到期':'剩 '+diffDays+' 天';

    var evTitle=document.createElement('div');
    evTitle.style.cssText='font-family:"Noto Sans TC",sans-serif;font-size:13px;font-weight:500;color:var(--ink);flex:1;line-height:1.4;';
    evTitle.innerHTML=(BRAND_EMOJI[t.brand]||'')+' '+t.evTitle+
      '<span style="font-weight:400;color:'+(isOverdue?'#C0392B':isSoon?'#B85C2C':'var(--ink3)')+';">｜'+cdTxt+' '+dueDateStr+'</span>';

    row1.appendChild(chk);
    row1.appendChild(evTitle);
    item.appendChild(row1);

    // 第二行：事件 kw 備注
    if(t.evKw){
      var row2=document.createElement('div');
      row2.style.cssText='font-size:11px;color:var(--ink3);padding-left:24px;margin-top:3px;line-height:1.4;';
      row2.textContent=t.evKw;
      item.appendChild(row2);
    }

    // 第四行：任務備注文字
    if(t.text){
      var row4=document.createElement('div');
      row4.style.cssText='font-size:12px;color:var(--ink2);padding:5px 8px 2px 24px;margin-top:3px;line-height:1.6;white-space:pre-wrap;border-left:2px solid var(--line2);margin-left:24px;';
      row4.textContent=t.text;
      item.appendChild(row4);
    }

    return item;
  }

  if(undone.length>0){
    var lbl1=document.createElement('div');
    lbl1.className='tasks-section-lbl';lbl1.textContent='待完成（'+undone.length+'）';
    body.appendChild(lbl1);
    undone.forEach(function(t){body.appendChild(renderTaskItem(t));});
  }
  if(doneItems.length>0){
    var lbl2=document.createElement('div');
    lbl2.className='tasks-section-lbl';lbl2.textContent='已完成（'+doneItems.length+'）';
    body.appendChild(lbl2);
    doneItems.forEach(function(t){body.appendChild(renderTaskItem(t));});
  }
}

// ============================================================
// 手機週清單（Mobile Week View）
// ============================================================
var mwvBaseDate=null; // 當週的週一日期字串

function mwvGetMonday(ds){
  var d=new Date(ds+'T00:00:00');
  var day=d.getDay();if(day===0)day=7;
  d.setDate(d.getDate()-(day-1));
  return calFmt(d.getFullYear(),d.getMonth()+1,d.getDate());
}

function mwvInit(){
  mwvBaseDate=mwvGetMonday(calTodayStr());
  mwvRender();
}

function mwvPrev(){
  var d=new Date(mwvBaseDate+'T00:00:00');
  d.setDate(d.getDate()-7);
  mwvBaseDate=calFmt(d.getFullYear(),d.getMonth()+1,d.getDate());
  mwvRender();
}

function mwvNext(){
  var d=new Date(mwvBaseDate+'T00:00:00');
  d.setDate(d.getDate()+7);
  mwvBaseDate=calFmt(d.getFullYear(),d.getMonth()+1,d.getDate());
  mwvRender();
}

function mwvGoToday(){
  mwvBaseDate=mwvGetMonday(calTodayStr());
  mwvRender();
}

function mwvRender(){
  var container=document.getElementById('mwvDays');
  var lbl=document.getElementById('mwvWeekLbl');
  if(!container||!lbl)return;
  container.innerHTML='';

  var today=calTodayStr();
  // 週一到週日
  var days=[];
  for(var i=0;i<7;i++){
    var d=new Date(mwvBaseDate+'T00:00:00');
    d.setDate(d.getDate()+i);
    days.push(calFmt(d.getFullYear(),d.getMonth()+1,d.getDate()));
  }

  // 週標題：例如「4月28日 – 5月4日」
  var s=days[0],e=days[6];
  var sp=s.split('-'),ep=e.split('-');
  var sLbl=parseInt(sp[1])+'月'+parseInt(sp[2])+'日';
  var eLbl=parseInt(ep[1])+'月'+parseInt(ep[2])+'日';
  lbl.textContent=sLbl+' – '+eLbl;

  var WD_LABELS=['一','二','三','四','五','六','日'];
  var mmddFixed=FIXED_LABELS; // 節氣節日

  days.forEach(function(ds,idx){
    var isPast=ds<today;
    var isToday=ds===today;
    var mmdd=ds.slice(5);

    // 取得當天事件
    var evs=getCurrentEvents().filter(function(e){
      if(calFilters.size>0){
        var ets=getEvTypes(e);
        var hasVisible=ets.some(function(t){return !calFilters.has(t);});
        if(!hasVisible&&ets.length>0)return false;
      }
      // 單日事件
      if(e.date===ds)return true;
      // 跨日事件
      if(e.dateEnd&&e.dateEnd>e.date&&ds>=e.date&&ds<=e.dateEnd)return true;
      return false;
    });

    var dayEl=document.createElement('div');
    dayEl.className='mwv-day'+(isToday?' mwv-today':isPast?' mwv-past':'');

    // 日期 header
    var hdr=document.createElement('div');
    hdr.className='mwv-day-hdr';
    hdr.onclick=function(){calOpenAdd(ds);};

    var numEl=document.createElement('div');
    numEl.className='mwv-day-num';
    numEl.textContent=parseInt(ds.slice(8));

    var wdEl=document.createElement('div');
    wdEl.className='mwv-day-wd';
    wdEl.textContent=WD_LABELS[idx];

    hdr.appendChild(numEl);
    hdr.appendChild(wdEl);

    // 節氣 tag
    if(mmddFixed[mmdd]){
      var tagEl=document.createElement('div');
      tagEl.className='mwv-day-tag';
      tagEl.textContent=mmddFixed[mmdd];
      hdr.appendChild(tagEl);
    }

    // 右側色點（最多5個）
    if(evs.length>0){
      var dots=document.createElement('div');
      dots.className='mwv-day-dots';
      var showN=Math.min(evs.length,5);
      for(var di=0;di<showN;di++){
        var evBrand=evs[di]._brand||(calBrand==='all'?null:calBrand);
        var col=getTypeColor(getEvPrimaryType(evs[di]),evBrand);
        var dot=document.createElement('div');
        dot.className='mwv-dot';
        dot.style.background=col;
        dots.appendChild(dot);
      }
      if(evs.length>5){
        var more=document.createElement('span');
        more.style.cssText='font-family:"Space Mono",monospace;font-size:9px;color:var(--ink3);';
        more.textContent='+' + (evs.length-5);
        dots.appendChild(more);
      }
      hdr.appendChild(dots);
    }
    dayEl.appendChild(hdr);

    // 事件清單
    if(evs.length===0){
      var empty=document.createElement('div');
      empty.className='mwv-day-empty';
      empty.textContent='－';
      dayEl.appendChild(empty);
    } else {
      var body=document.createElement('div');
      body.className='mwv-day-body';
      evs.forEach(function(ev){
        var evBrand=ev._brand||(calBrand==='all'?null:calBrand);
        var col=getTypeColor(getEvPrimaryType(ev),evBrand);
        var evEl=document.createElement('div');
        evEl.className='mwv-ev';
        evEl.style.background=col+'12';
        var bar=document.createElement('div');
        bar.className='mwv-ev-bar';
        bar.style.background=col;
        var content=document.createElement('div');
        content.className='mwv-ev-content';
        var titleEl=document.createElement('div');
        titleEl.className='mwv-ev-title';
        var displayTitle=ev.title;
        if(calBrand==='all'&&ev._brand&&BRAND_EMOJI[ev._brand]){
          displayTitle=BRAND_EMOJI[ev._brand]+' '+displayTitle;
        }
        titleEl.textContent=displayTitle;
        content.appendChild(titleEl);
        if(!isAllDayEv(ev)){
          var timeEl=document.createElement('div');
          timeEl.className='mwv-ev-time';
          timeEl.textContent=ev.time;
          content.appendChild(timeEl);
        }
        evEl.appendChild(bar);
        evEl.appendChild(content);
        evEl.onclick=function(e){e.stopPropagation();calOpenEdit(ev.id);};
        body.appendChild(evEl);
      });
      dayEl.appendChild(body);
    }
    container.appendChild(dayEl);
  });
}

// 當品牌切換或資料更新時，同步更新週清單
var _origCalRender=null;
function mwvHookRender(){
  if(_origCalRender)return;
  _origCalRender=window.calRender;
  window.calRender=function(){
    _origCalRender();
    if(mwvBaseDate)mwvRender();
  };
}

// 偵測手機並初始化
function mwvCheckAndInit(){
  if(window.innerWidth<=768){
    mwvInit();
    mwvHookRender();
  }
}
window.addEventListener('resize',function(){
  if(window.innerWidth<=768&&!mwvBaseDate){
    mwvInit();
    mwvHookRender();
  }
});

calLoad();
calRender();
mwvCheckAndInit();

</script>
</body>
</html>
